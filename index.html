  /* ═══════════════════════════════════════════════
     🌿 앱 아이콘 생성 + PWA Manifest 동적 등록

  (function() {
    function drawIcon(size) {
      var c = document.createElement('canvas');
      c.width = c.height = size;
      var ctx = c.getContext('2d');
      var s = size / 512;

      // ── 배경 (라운드 사각형, 따뜻한 그라디언트) ──
      var bg = ctx.createLinearGradient(0, 0, size, size);
      bg.addColorStop(0,   '#FAEBD7');
      bg.addColorStop(0.4, '#E8B79E');
      bg.addColorStop(1,   '#C4836A');
      ctx.beginPath();
      var r = 96 * s;
      ctx.moveTo(r, 0);
      ctx.lineTo(size - r, 0);
      ctx.quadraticCurveTo(size, 0, size, r);
      ctx.lineTo(size, size - r);
      ctx.quadraticCurveTo(size, size, size - r, size);
      ctx.lineTo(r, size);
      ctx.quadraticCurveTo(0, size, 0, size - r);
      ctx.lineTo(0, r);
      ctx.quadraticCurveTo(0, 0, r, 0);
      ctx.closePath();
      ctx.fillStyle = bg;
      ctx.fill();

      // ── 아기 얼굴 (크림색 원) ──
      ctx.beginPath();
      ctx.arc(256*s, 248*s, 136*s, 0, Math.PI*2);
      ctx.fillStyle = '#FDE8D4';
      ctx.fill();

      // ── 귀 ──
      ctx.beginPath(); ctx.arc(122*s, 250*s, 36*s, 0, Math.PI*2);
      ctx.fillStyle = '#FDD5BB'; ctx.fill();
      ctx.beginPath(); ctx.arc(390*s, 250*s, 36*s, 0, Math.PI*2);
      ctx.fillStyle = '#FDD5BB'; ctx.fill();

      // ── 볼터치 ──
      ctx.globalAlpha = 0.5;
      ctx.beginPath(); ctx.ellipse(196*s, 284*s, 34*s, 24*s, 0, 0, Math.PI*2);
      ctx.fillStyle = '#F0907A'; ctx.fill();
      ctx.beginPath(); ctx.ellipse(316*s, 284*s, 34*s, 24*s, 0, 0, Math.PI*2);
      ctx.fillStyle = '#F0907A'; ctx.fill();
      ctx.globalAlpha = 1.0;

      // ── 눈 ──
      function eye(cx, cy) {
        // 흰자
        ctx.beginPath(); ctx.ellipse(cx*s, cy*s, 18*s, 22*s, 0, 0, Math.PI*2);
        ctx.fillStyle = '#fff'; ctx.fill();
        // 동공
        ctx.beginPath(); ctx.ellipse(cx*s, (cy+2)*s, 12*s, 14*s, 0, 0, Math.PI*2);
        ctx.fillStyle = '#3A2410'; ctx.fill();
        // 하이라이트
        ctx.beginPath(); ctx.arc((cx+5)*s, (cy-4)*s, 5*s, 0, Math.PI*2);
        ctx.fillStyle = '#fff'; ctx.fill();
        ctx.beginPath(); ctx.arc((cx-4)*s, (cy+4)*s, 2.5*s, 0, Math.PI*2);
        ctx.fillStyle = '#fff'; ctx.fill();
      }
      eye(216, 238); eye(296, 238);

      // ── 코 ──
      ctx.beginPath(); ctx.ellipse(256*s, 268*s, 8*s, 6*s, 0, 0, Math.PI*2);
      ctx.fillStyle = '#D4927A'; ctx.globalAlpha=0.5; ctx.fill();
      ctx.globalAlpha=1.0;

      // ── 입 (웃음) ──
      ctx.beginPath();
      ctx.moveTo(220*s, 285*s);
      ctx.bezierCurveTo(232*s, 308*s, 280*s, 308*s, 292*s, 285*s);
      ctx.strokeStyle = '#C4836A'; ctx.lineWidth = 5*s;
      ctx.lineCap = 'round'; ctx.stroke();

      // 입술 색
      ctx.beginPath();
      ctx.moveTo(220*s, 285*s);
      ctx.bezierCurveTo(232*s, 308*s, 280*s, 308*s, 292*s, 285*s);
      ctx.strokeStyle = '#E8957A'; ctx.lineWidth = 3.5*s;
      ctx.stroke();

      // ── 새싹 / 잎사귀 (머리 위) ──
      // 줄기
      ctx.beginPath();
      ctx.moveTo(256*s, 112*s); ctx.lineTo(256*s, 80*s);
      ctx.strokeStyle = '#7A9E7A'; ctx.lineWidth = 6*s;
      ctx.lineCap = 'round'; ctx.stroke();

      // 왼쪽 잎
      ctx.beginPath();
      ctx.moveTo(256*s, 95*s);
      ctx.bezierCurveTo(226*s, 82*s, 210*s, 52*s, 230*s, 42*s);
      ctx.bezierCurveTo(248*s, 36*s, 260*s, 72*s, 256*s, 95*s);
      ctx.fillStyle = '#8FBF7A'; ctx.fill();

      // 오른쪽 잎
      ctx.beginPath();
      ctx.moveTo(256*s, 95*s);
      ctx.bezierCurveTo(286*s, 82*s, 302*s, 52*s, 282*s, 42*s);
      ctx.bezierCurveTo(264*s, 36*s, 252*s, 72*s, 256*s, 95*s);
      ctx.fillStyle = '#72A862'; ctx.fill();

      // ── 하트 (좌상단) ──
      function heart(x, y, w, col, alpha) {
        ctx.globalAlpha = alpha || 0.9;
        ctx.fillStyle = col;
        ctx.save(); ctx.translate(x*s, y*s); ctx.scale(w*s/100, w*s/100);
        ctx.beginPath();
        ctx.moveTo(0, 20);
        ctx.bezierCurveTo(-10, 5, -40, 5, -40, 25);
        ctx.bezierCurveTo(-40, 50, 0, 70, 0, 80);
        ctx.bezierCurveTo(0, 70, 40, 50, 40, 25);
        ctx.bezierCurveTo(40, 5, 10, 5, 0, 20);
        ctx.fill(); ctx.restore();
        ctx.globalAlpha = 1.0;
      }
      heart(120, 158, 42, '#E88A8A', 0.75);
      heart(392, 140, 30, '#E8A87A', 0.65);
      heart(420, 310, 24, '#E8A0A0', 0.5);

      // ── 작은 별 ──
      function star(x, y, r, col) {
        ctx.save(); ctx.translate(x*s, y*s); ctx.fillStyle = col;
        ctx.beginPath();
        for(var i=0; i<5; i++){
          var a = (i*4-1)*Math.PI/5;
          if(i===0) ctx.moveTo(Math.cos(a)*r*s, Math.sin(a)*r*s);
          else ctx.lineTo(Math.cos(a)*r*s, Math.sin(a)*r*s);
          a += 2*Math.PI/5;
          ctx.lineTo(Math.cos(a)*r*0.4*s, Math.sin(a)*r*0.4*s);
        }
        ctx.closePath(); ctx.fill(); ctx.restore();
      }
      star(152, 128, 16, '#F5C87A');
      star(370, 180, 12, '#F5C87A');

      // ── 아래 다이어리 책 ──
      // 표지
      var bx=164*s, by=388*s, bw=184*s, bh=90*s, br=12*s;

      ctx.moveTo(bx+br, by);
      ctx.lineTo(bx+bw-br, by); ctx.quadraticCurveTo(bx+bw, by, bx+bw, by+br);
      ctx.lineTo(bx+bw, by+bh-br); ctx.quadraticCurveTo(bx+bw, by+bh, bx+bw-br, by+bh);
      ctx.lineTo(bx+br, by+bh); ctx.quadraticCurveTo(bx, by+bh, bx, by+bh-br);
      ctx.lineTo(bx, by+br); ctx.quadraticCurveTo(bx, by, bx+br, by);
      ctx.closePath();
      ctx.fillStyle = '#C4836A'; ctx.fill();

      // 페이지
      ctx.beginPath();
      ctx.roundRect ? ctx.roundRect((bx+5), (by+4), bw-12, bh-8, 8) :
        (ctx.rect((bx+5), (by+4), bw-12, bh-8));
      ctx.fillStyle = '#FDF5E8'; ctx.fill();

      // 책 바인딩 선
      ctx.beginPath();
      ctx.moveTo((256+2)*s, by); ctx.lineTo((256+2)*s, by+bh);
      ctx.strokeStyle = '#B8745A'; ctx.lineWidth = 5*s; ctx.stroke();

      // 줄 3개
      [[182,408],[182,422],[182,436]].forEach(function(pos) {
        ctx.beginPath();
        ctx.moveTo(pos[0]*s, pos[1]*s); ctx.lineTo(244*s, pos[1]*s);
        ctx.strokeStyle = '#DEC9A8'; ctx.lineWidth = 3.5*s;
        ctx.lineCap='round'; ctx.stroke();
      });

      // 하트 on 책
      heart(283, 428, 46, '#E88080', 0.85);

      return c.toDataURL('image/png');
    }

    // 아이콘 생성 (192, 512, 180px)
    var icon512 = drawIcon(512);
    var icon192 = drawIcon(192);
    var icon180 = drawIcon(180);

    // Apple Touch Icon 주입
    var appleLink = document.createElement('link');
    appleLink.rel = 'apple-touch-icon';
    appleLink.sizes = '180x180';
    appleLink.href = icon180;
    document.head.appendChild(appleLink);

    // favicon 교체
    var favicon = document.querySelector('link[rel="icon"]');
    if(favicon) favicon.href = drawIcon(64);
    else {
      var fav = document.createElement('link');
      fav.rel = 'icon'; fav.type = 'image/png'; fav.href = drawIcon(64);
      document.head.appendChild(fav);
    }

    // PWA Manifest 동적 생성
    var manifest = {
      name: "포동이 육아일기",
      short_name: "포동이 육아일기",
      description: "소중한 아이의 성장을 기록하는 육아 다이어리",
      start_url: "./",
      display: "standalone",
      background_color: "#FAEBD7",
      theme_color: "#C4836A",
      orientation: "portrait-primary",
      lang: "ko",
      icons: [
        { src: icon192, sizes: "192x192", type: "image/png", purpose: "any maskable" },
        { src: icon512, sizes: "512x512", type: "image/png", purpose: "any maskable" }
      ]
    };
    var blob = new Blob([JSON.stringify(manifest)], {type:'application/manifest+json'});
    var manifestURL = URL.createObjectURL(blob);
    var manifestLink = document.createElement('link');
    manifestLink.rel = 'manifest';
    manifestLink.href = manifestURL;
    document.head.appendChild(manifestLink);
  })();

const { useState, useCallback, useRef, useEffect, cloneElement } = React;

/* ══════════════════════════════════════════════════════════
   IndexedDB 영구 저장소 — 앱 재시작 후에도 데이터 보존
══════════════════════════════════════════════════════════ */
const PDB = (() => {
  const DB_NAME = 'podong_diary_v1';
  const STORES  = ['meta','diaries','hospital','gallery'];
  let _db = null;

  const open = () => new Promise((res, rej) => {
    if (_db) return res(_db);
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      STORES.forEach(s => { if (!db.objectStoreNames.contains(s)) db.createObjectStore(s, {keyPath:'_k'}); });
    };
    req.onsuccess  = e => { _db = e.target.result; res(_db); };
    req.onerror    = () => rej(req.error);
  });

  const get = async (store, key) => {
    try {
      const db = await open();
      return await new Promise((res, rej) => {
        const req = db.transaction(store).objectStore(store).get(key);
        req.onsuccess = e => res(e.target.result ? e.target.result.v : null);
        req.onerror   = () => rej(req.error);
      });
    } catch { return null; }
  };

  const set = async (store, key, value) => {
    try {
      const db = await open();
      await new Promise((res, rej) => {
        const tx  = db.transaction(store, 'readwrite');
        tx.objectStore(store).put({_k: key, v: value});
        tx.oncomplete = res;
        tx.onerror    = () => rej(tx.error);
      });
    } catch(e) { console.warn('PDB.set failed:', e); }
  };

  const del = async (store, key) => {
    try {
      const db = await open();
      await new Promise((res, rej) => {
        const tx = db.transaction(store, 'readwrite');
        tx.objectStore(store).delete(key);
        tx.oncomplete = res; tx.onerror = () => rej(tx.error);
      });
    } catch {}
  };

  const clear = async () => {
    try {
      const db = await open();
      await Promise.all(STORES.map(s => new Promise((res, rej) => {
        const tx = db.transaction(s, 'readwrite');
        tx.objectStore(s).clear();
        tx.oncomplete = res; tx.onerror = () => rej(tx.error);
      })));
    } catch {}
  };

  /* 저장 용량 추정 */
  const usage = async () => {
    try {
      if (navigator.storage && navigator.storage.estimate) {
        const {usage, quota} = await navigator.storage.estimate();
        return { used: Math.round(usage/1024/1024*10)/10, total: Math.round(quota/1024/1024) };
      }
    } catch {}
    return { used: 0, total: 0 };
  };

  return { get, set, del, clear, usage };
})();

const I = {

function Phone({ children }) {

    <div style={{
      width:"100%", height:"100%",

      background:"var(--paper)",
      fontFamily:"var(--fn)",
      WebkitFontSmoothing:"antialiased",
      position:"relative",
      overflow:"hidden",
      backgroundImage:"radial-gradient(rgba(120,90,60,.045) 1px,transparent 1px),radial-gradient(rgba(140,110,80,.035) 1px,transparent 1px)",
      backgroundSize:"3px 3px,7px 7px",
      backgroundPosition:"0 0,1px 2px",

      {children}

}

function Chip({ children, color="wood", active, onClick, sm }) {
  const M = { wood:{bg:"var(--paper-3)",fg:"var(--ink-2)",br:"var(--paper-edge)"},
    rose:{bg:"#FAE8E2",fg:"#B8644A",br:"rgba(196,131,106,.35)"},
    sage:{bg:"#E2EDD8",fg:"#3F5439",br:"rgba(143,166,138,.4)"},
    honey:{bg:"#F8EBCC",fg:"#7A4F1A",br:"rgba(193,152,75,.35)"},
    plum:{bg:"#EEE0EC",fg:"#5F3F55",br:"rgba(142,102,128,.35)"},
    ink:{bg:"var(--ink)",fg:"var(--paper-3)",br:"transparent"},
    blue:{bg:"#D6E8F5",fg:"#2A5C7A",br:"rgba(74,122,170,.3)"},
    danger:{bg:"var(--danger-bg)",fg:"var(--danger)",br:"transparent"},
  };
  const c = M[color]||M.wood;
  return (
    <span onClick={onClick} className={onClick?"btn":""} style={{ display:"inline-flex", alignItems:"center", gap:4,
      padding: sm?"3px 8px":"4px 10px", borderRadius:999,
      background:active?"var(--ink)":c.bg, color:active?"var(--paper-3)":c.fg,
      border:`1px solid ${c.br}`, fontFamily:"var(--fn)",
      fontSize:sm?11:12, fontWeight:600, whiteSpace:"nowrap", boxShadow:active?"none":"0 1px 2px rgba(58,46,32,.06)" }}>{children}</span>
  );
}

function PhotoPH({ w="100%", h=80, hue="rose", label, taped, rounded=8, style={} }) {
  const P = { rose:["#E8B79E","#C4836A"], sage:["#B8C9B0","#8FA68A"],
    honey:["#E8C988","#C9A057"], plum:["#C9A8BE","#8E6680"],
    cream:["#F0E0BA","#D4B780"], blue:["#A8B8C9","#5C7A8E"] };

/* ── 저장 용량 표시 컴포넌트 ── */
function StorageInfo() {
  const [info, setInfo] = useState(null);
  useEffect(() => { PDB.usage().then(setInfo); }, []);
  if (!info || info.total === 0) return null;
  const pct = Math.min(100, Math.round(info.used / info.total * 100));
  const barColor = pct > 80 ? "var(--danger)" : pct > 50 ? "var(--honey)" : "var(--sage)";
  return (
    <div style={{ margin:"8px 24px 4px", padding:"12px 14px", background:"var(--paper-2)",
      borderRadius:"var(--rs)", border:"1px solid var(--paper-edge)" }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
        <div style={{ fontSize:13, fontWeight:600, color:"var(--ink-2)" }}>💾 기기 저장 용량</div>
        <div style={{ fontSize:12, color:"var(--ink-3)" }}>{info.used}MB / {info.total}MB</div>
      </div>
      <div style={{ height:6, background:"var(--paper-edge)", borderRadius:3, overflow:"hidden" }}>
        <div style={{ height:"100%", width:`${pct}%`, background:barColor, borderRadius:3, transition:"width .5s" }}/>
      </div>
      <div style={{ fontSize:11, color:"var(--ink-3)", marginTop:4 }}>포동이의 성장일기 사용: {pct}%</div>
    </div>
  );
}

/* ══ 쓸어내리기 닫기 — 전역 터치 핸들러 ══ */
function useSwipeDown(ref, onClose) {
  const sy = useRef(0), dy = useRef(0);
  useEffect(() => {
    const el = ref.current;
    if(!el) return;
    const onTS = e => { sy.current = e.touches[0].clientY; dy.current = 0; el.style.transition="none"; };
    const onTM = e => { const d=e.touches[0].clientY-sy.current; if(d<0)return; dy.current=d; el.style.transform=`translateY(${d}px)`; };
    const onTE = () => {
      if(dy.current>80){ el.style.transition="transform .22s ease"; el.style.transform="translateY(110%)"; setTimeout(onClose,210); }
      else { el.style.transition="transform .2s cubic-bezier(.22,1,.36,1)"; el.style.transform="translateY(0)"; }
    };
    el.addEventListener("touchstart",onTS,{passive:true});
    el.addEventListener("touchmove",onTM,{passive:true});
    el.addEventListener("touchend",onTE);
    return()=>{ el.removeEventListener("touchstart",onTS); el.removeEventListener("touchmove",onTM); el.removeEventListener("touchend",onTE); };
  }, [ref, onClose]);
}

/* 더보기 메뉴 시트 */

  const ref = useRef(null);
  useSwipeDown(ref, onClose);

      display:"flex", alignItems:"flex-end", animation:"fadeIn .18s" }} onClick={onClose}>

}
