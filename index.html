                                    borderRadius:3, padding:"0 2px" }}>{part}</span>
                                : part
                            )}
                          </div>
                          <div style={{ fontSize:13, color:"var(--ink-3)", marginBottom:4 }}>{e.body.slice(0,40)}…</div>
                          <div style={{ display:"flex", gap:4, flexWrap:"wrap" }}>
                            {e.tags.map((t,j)=><Chip key={j} color={e.hue} sm>{t}</Chip>)}
                          </div>
                        </div>
                        <div style={{ fontSize:13, color:"var(--ink-3)", flexShrink:0, marginTop:2 }}>{e.date}</div>
                      </div>
                    ))}

                    {/* Google 검색 유도 */}
                    <div onClick={()=>setSearchTab("🌐 육아정보")} className="btn"
                      style={{ display:"flex", alignItems:"center", gap:10, padding:"12px 14px",
                        background:"var(--paper-2)", borderRadius:"var(--r)",
                        border:"1px solid var(--ink-line-2)", marginTop:4 }}>
                      <svg width="18" height="18" viewBox="0 0 24 24">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                      </svg>
                      <span style={{ flex:1, fontSize:15, color:"var(--ink-2)" }}>
                        「{searchQuery}」 육아 정보 Google 검색
                      </span>
                      <span style={{ fontSize:14, color:"#4285F4" }}>이동 ›</span>
                    </div>
                  </>
                )}
              </>
            )}
          </div>

          {/* 닫기 */}
          <div style={{ padding:"12px 16px 32px", flexShrink:0 }}>
            <div onClick={()=>{ setShowSearch(false); setSearchQuery(""); }} className="btn"
              style={{ width:"100%", padding:"13px 0", textAlign:"center",
                background:"var(--paper-2)", borderRadius:"var(--r)",
                border:"1px solid var(--paper-edge)", fontSize:16, fontWeight:600,
                color:"var(--ink-2)" }}>닫기</div>
          </div>
        </div>
      )}

      {/* ════════════════════════════════════════
          🔔 알림 패널
      ════════════════════════════════════════ */}
      {showNotif&&(
        <div style={{ position:"absolute", inset:0, background:"rgba(0,0,0,.42)", zIndex:300,
          display:"flex", alignItems:"flex-end", animation:"fadeIn .18s" }}
          onClick={()=>setShowNotif(false)}>
          <div style={{ width:"100%", background:"var(--paper-3)", borderRadius:"20px 20px 0 0",
            maxHeight:"82%", display:"flex", flexDirection:"column", animation:"slideUp .24s" }}
            onClick={e=>e.stopPropagation()}>

            {/* 핸들 */}
            <div style={{ display:"flex", justifyContent:"center", padding:"12px 0 0" }}>
              <div style={{ width:40, height:4, borderRadius:2, background:"var(--paper-edge)" }}/>
            </div>

            {/* 헤더 */}
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between",
              padding:"10px 20px 12px", borderBottom:"1px solid var(--ink-line-2)", flexShrink:0 }}>
              <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                <div style={{ fontFamily:"var(--fs)", fontSize:18, fontWeight:700, color:"var(--ink)" }}>알림</div>
                {unreadCount>0&&(
                  <div style={{ padding:"2px 8px", borderRadius:999, background:"var(--danger)",
                    color:"white", fontSize:13, fontWeight:700 }}>{unreadCount}</div>
                )}
              </div>
              <div style={{ display:"flex", gap:12, alignItems:"center" }}>
                {notifs.length>0&&<>
                  <div onClick={()=>{ const all={}; notifs.forEach(n=>all[n.id]=true); setNotifRead(all); }}
                    className="btn" style={{ fontSize:14, color:"var(--rose)", fontWeight:600 }}>모두 읽음</div>
                  <div onClick={deleteAll} className="btn"
                    style={{ fontSize:14, color:"var(--danger)", fontWeight:600 }}>모두 삭제</div>
                </>}
              </div>
            </div>

            {/* 알림 목록 */}
            <div style={{ flex:1, overflowY:"auto", minHeight:0 }}>

              {/* 빈 상태 */}
              {notifs.length===0&&(
                <div style={{ textAlign:"center", padding:"48px 20px" }}>
                  <div style={{ fontSize:46, marginBottom:12 }}>🔕</div>
                  <div style={{ fontFamily:"var(--fh)", fontSize:18, color:"var(--ink-3)" }}>알림이 없어요</div>
                  <div style={{ fontSize:14, color:"var(--ink-3)", marginTop:6 }}>새로운 알림이 오면 여기에 표시돼요</div>
                </div>
              )}

              {/* 중요 알림 */}
              {notifs.filter(n=>n.urgent).length>0&&(
                <div>
                  <div style={{ padding:"10px 20px 4px", fontSize:13, fontWeight:700,
                    color:"var(--danger)", letterSpacing:.5 }}>📌 중요 알림</div>
                  {notifs.filter(n=>n.urgent).map(n=>(
                    <div key={n.id} style={{ display:"flex", alignItems:"center", gap:0,
                      background:notifRead[n.id]?"transparent":"var(--danger-bg)",
                      borderBottom:"1px solid var(--ink-line-2)" }}>
                      <div onClick={()=>{ setNotifRead(r=>({...r,[n.id]:true})); nav("hospital"); setShowNotif(false); }}
                        className="btn" style={{ flex:1, display:"flex", gap:12, padding:"12px 16px 12px 20px" }}>
                        <div style={{ width:42, height:42, borderRadius:12, background:"var(--danger-bg)",
                          border:"1.5px solid rgba(192,57,43,.2)",
                          display:"flex", alignItems:"center", justifyContent:"center", fontSize:22, flexShrink:0 }}>{n.icon}</div>
                        <div style={{ flex:1 }}>
                          <div style={{ fontFamily:"var(--fn)", fontSize:15, fontWeight:700, color:"var(--danger)" }}>{n.title}</div>
                          <div style={{ fontSize:13, color:"var(--ink-3)", marginTop:2 }}>{n.body}</div>
                          <div style={{ fontSize:12, color:"var(--ink-3)", marginTop:3 }}>{n.time}</div>
                        </div>
                        {!notifRead[n.id]&&<div style={{ width:8, height:8, borderRadius:4,
                          background:"var(--danger)", flexShrink:0, alignSelf:"flex-start", marginTop:4 }}/>}
                      </div>
                      {/* 삭제 버튼 */}
                      <div onClick={()=>deleteNotif(n.id)} className="btn"
                        style={{ padding:"0 16px", height:"100%", display:"flex", alignItems:"center",
                          color:"var(--danger)", opacity:.7, flexShrink:0 }}>
                        {cloneElement(I.trash,{width:16,height:16})}
                      </div>
                    </div>
                  ))}
                </div>
              )}

              {/* 일반 알림 */}
              {notifs.filter(n=>!n.urgent).length>0&&(
                <div>
                  <div style={{ padding:"10px 20px 4px", fontSize:13, fontWeight:700,
                    color:"var(--ink-3)", letterSpacing:.5 }}>최근 알림</div>
                  {notifs.filter(n=>!n.urgent).map(n=>{
                    const colors = { check:"var(--sage-bg)", star:"var(--name-bg)", diary:"var(--rose-bg)", anniv:"var(--honey-bg)" };
                    const tc     = { check:"var(--sage)", star:"var(--name)", diary:"var(--rose)", anniv:"var(--honey)" };
                    return (
                      <div key={n.id} style={{ display:"flex", alignItems:"center",
                        background:notifRead[n.id]?"transparent":"rgba(242,232,213,.5)",
                        borderBottom:"1px solid var(--ink-line-2)" }}>
                        <div onClick={()=>setNotifRead(r=>({...r,[n.id]:true}))}
                          className="btn" style={{ flex:1, display:"flex", gap:12, padding:"12px 16px 12px 20px" }}>
                          <div style={{ width:42, height:42, borderRadius:12,
                            background:colors[n.type]||"var(--paper-2)",
                            display:"flex", alignItems:"center", justifyContent:"center",
                            fontSize:22, flexShrink:0 }}>{n.icon}</div>
                          <div style={{ flex:1 }}>
                            <div style={{ fontFamily:"var(--fn)", fontSize:15, fontWeight:notifRead[n.id]?500:700,
                              color:notifRead[n.id]?"var(--ink-2)":"var(--ink)" }}>{n.title}</div>
                            <div style={{ fontSize:13, color:"var(--ink-3)", marginTop:2, lineHeight:1.4 }}>{n.body}</div>
                            <div style={{ fontSize:12, color:"var(--ink-3)", marginTop:3 }}>{n.time}</div>
                          </div>
                          {!notifRead[n.id]&&<div style={{ width:8, height:8, borderRadius:4,
                            background:tc[n.type]||"var(--rose)", flexShrink:0, alignSelf:"flex-start", marginTop:4 }}/>}
                        </div>
                        {/* 삭제 버튼 */}
                        <div onClick={()=>deleteNotif(n.id)} className="btn"
                          style={{ padding:"0 16px", alignSelf:"stretch", display:"flex", alignItems:"center",
                            color:"var(--ink-3)", flexShrink:0 }}>
                          {cloneElement(I.trash,{width:16,height:16})}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>

            {/* 닫기 */}
            <div style={{ padding:"12px 20px 32px", flexShrink:0, borderTop:"1px solid var(--ink-line-2)" }}>
              <div onClick={()=>setShowNotif(false)} className="btn"
                style={{ width:"100%", padding:"12px 0", textAlign:"center",
                  background:"var(--paper-2)", borderRadius:"var(--r)",
                  border:"1px solid var(--paper-edge)", fontSize:16, fontWeight:600, color:"var(--ink-2)" }}>닫기</div>
            </div>
          </div>
        </div>
      )}
    </Phone>
  );
}

/* ═══════════════════════════════════════════════════════════
   화면 2 — 일기 쓰기 (미디어 버튼 완전 작동)
═══════════════════════════════════════════════════════════ */
function WriteScreen({ nav, onSave, editDiary, babyName="포동이", galleryFolders=[], onAddGalleryPhotos }) {
  const _now = new Date();
  const _DOW = ["일","월","화","수","목","금","토"];
  const _dateStr = `${_now.getFullYear()}년 ${_now.getMonth()+1}월 ${_now.getDate()}일 (${_DOW[_now.getDay()]}요일)`;
  const [role,      setRole]      = useState(editDiary?.role||"mom");
  const [emotion,   setEmotion]   = useState(editDiary?.emotion||0);
  const [title,     setTitle]     = useState(editDiary?.title||"");
  const [body,      setBody]      = useState(editDiary?.body||"");
  const [tags,      setTags]      = useState(editDiary?.tags||[]);
  const [newTag,    setNewTag]    = useState("");
  const [addingTag, setAddingTag] = useState(false);
  const [showCancel, setShowCancel] = useState(false);
  const [photoFolder, setPhotoFolder] = useState("일기 사진"); // 앨범 저장 폴더

  /* textarea 자동 높이 */
  const bodyRef = useRef(null);
  useEffect(() => {
    if(bodyRef.current) {
      bodyRef.current.style.height = "auto";
      bodyRef.current.style.height = bodyRef.current.scrollHeight + "px";
    }
  }, [body]);

  /* 미디어 상태 */
  const [photos,    setPhotos]    = useState(editDiary?.photos   || []);
  const [videos,    setVideos]    = useState(editDiary?.videos   || []);
  /* 실제 파일 피커 refs */
  const camPhotoRef  = useRef(null);
  const galPhotoRef  = useRef(null);
  const camVideoRef  = useRef(null);
  const galVideoRef  = useRef(null);

  const handleFileSelect = (files, type) => {
    if(!files || files.length === 0) return;
    Array.from(files).forEach(file => {
      if(type === "video") {
        const blobUrl = URL.createObjectURL(file);
        setVideos(v => [...v, { url: blobUrl, blobOnly:true, name: file.name }]);
      } else {
        const reader = new FileReader();
        reader.onload = e => {
          const dataUrl = e.target.result;
          setPhotos(p => [...p, { url: dataUrl, taped: p.length === 0 }]);
          /* 앨범에도 자동 저장 */
          if (onAddGalleryPhotos) {
            const now = new Date();
            onAddGalleryPhotos([{
              id: Date.now() + Math.random(),
              type: "photo", url: dataUrl,
              name: file.name, label: "일기 사진",
              folder: photoFolder || "일기 사진",
              date: `${now.getMonth()+1}/${now.getDate()}`,
              hue: "rose",
            }]);
          }
        };
        reader.readAsDataURL(file);
      }
    });
    setSheet(null);
  };

  const [voices,    setVoices]    = useState(editDiary?.voices   || []);
  const [stickers,  setStickers]  = useState(editDiary?.stickers || []);

  /* 시트 상태 */
  const [sheet, setSheet] = useState(null);

  /* 녹음 상태 */
  const [recording,  setRecording]  = useState(false);
  const [recordSec,  setRecordSec]  = useState(0);
  const [recordTimer,setRecordTimer]= useState(null);
  const [playing,    setPlaying]    = useState(null);
  const [recError,   setRecError]   = useState(null);
  const [waveData,   setWaveData]   = useState(Array(40).fill(4));
  const mediaRecRef  = useRef(null);
  const audioChunks  = useRef([]);
  const analyserRef  = useRef(null);
  const animFrameRef = useRef(null);
  const streamRef    = useRef(null);
  const audioElRef   = useRef(null);

  const startRecording = async () => {
    setRecError(null);
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      streamRef.current = stream;
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const src = ctx.createMediaStreamSource(stream);
      const analyser = ctx.createAnalyser();
      analyser.fftSize = 128;
      src.connect(analyser);
      analyserRef.current = analyser;
      const buf = new Uint8Array(analyser.frequencyBinCount);
      const tick = () => {
        analyser.getByteFrequencyData(buf);
        setWaveData(Array.from({length:40}).map((_,i)=>{
          const v = buf[Math.floor(i * buf.length / 40)] || 0;
          return 4 + (v / 255) * 36;
        }));
        animFrameRef.current = requestAnimationFrame(tick);
      };
      tick();
      audioChunks.current = [];
      const mr = new MediaRecorder(stream);
      mr.ondataavailable = e => { if(e.data.size > 0) audioChunks.current.push(e.data); };
      mr.start(100);
      mediaRecRef.current = mr;
      setRecording(true); setRecordSec(0);
      const t = setInterval(() => setRecordSec(s => s + 1), 1000);
      setRecordTimer(t);
    } catch(e) {
      setRecError(e.name === "NotAllowedError" ? "마이크 권한을 허용해 주세요" : "마이크를 사용할 수 없어요");
    }
  };

  const stopRecording = () => {
    clearInterval(recordTimer);
    cancelAnimationFrame(animFrameRef.current);
    setWaveData(Array(40).fill(4));
    const mr = mediaRecRef.current;
    if(mr && mr.state !== "inactive") {
      mr.onstop = () => {
        const blob = new Blob(audioChunks.current, { type:"audio/webm" });
        const reader = new FileReader();
        reader.onload = e => {
          const dataUrl = e.target.result;
          const dur = `${Math.floor(recordSec/60)}:${String(recordSec%60).padStart(2,"0")}`;
          setVoices(v => [...v, { label:`음성메모 ${v.length+1}`, dur, url: dataUrl, filled:Math.min(28,Math.floor(recordSec*2)) }]);
        };
        reader.readAsDataURL(blob);
        audioChunks.current = [];
      };
      mr.stop();
    }
    if(streamRef.current) { streamRef.current.getTracks().forEach(t => t.stop()); streamRef.current = null; }
    setRecording(false); setRecordSec(0); setSheet(null);
  };

  const cancelRecording = () => {
    clearInterval(recordTimer);
    cancelAnimationFrame(animFrameRef.current);
    setWaveData(Array(40).fill(4));
    const mr = mediaRecRef.current;
    if(mr && mr.state !== "inactive") mr.stop();
    if(streamRef.current) { streamRef.current.getTracks().forEach(t => t.stop()); streamRef.current = null; }
    setRecording(false); setRecordSec(0);
  };

  const emotions = ["🥲 벅참","😄 행복","🥰 사랑","🤍 평온","😮 놀람","😢 그리움"];
  const STICKERS = ["❤️","🌸","⭐","🎉","🌈","🌙","🌿","🍀","🎀","🐣","🐥","🍼","👶","🏡","📷","🎵","✨","💛","💚","💜","🔔","🎂","🌻","🦋"];
  const VIDEO_COLORS = ["#C4836A","#8FA68A","#D9A85C","#8E6680","#5C7A8E"];

  const hasContent = title.trim() || body.trim() || photos.length > 0 || voices.length > 0 || videos.length > 0;

  const handleCancel = () => {
    if(hasContent) { setShowCancel(true); }
    else { nav("home"); }
  };

  const handleSave = () => {
    if(!title.trim() && !body.trim()) return;
    const _d = new Date();
    const _DOW2 = ["일","월","화","수","목","금","토"];
    const isEdit = !!editDiary;
    onSave({
      id: isEdit ? editDiary.id : Date.now(),
      role, emotion,
      title: title || "오늘의 기록",
      body, tags, photos, videos, voices, stickers,
      date:  isEdit ? editDiary.date   : `${_d.getMonth()+1}/${_d.getDate()}`,
      day:   isEdit ? editDiary.day    : _DOW2[_d.getDay()],
      year:  isEdit ? editDiary.year   : _d.getFullYear(),
      month: isEdit ? editDiary.month  : _d.getMonth()+1,
      dayNum:isEdit ? editDiary.dayNum : _d.getDate(),
      hue: "rose",
    });
    nav("home");
  };

  const fmt = s => `${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;

  return (
    <Phone>
      {/* ── 상단 바 ── */}
      <div style={{ padding:"54px 18px 8px", display:"flex", alignItems:"center",
        justifyContent:"space-between", flexShrink:0, borderBottom:"1px solid var(--ink-line-2)" }}>
        <div onClick={handleCancel} className="btn"
          style={{ fontSize:15, color:"var(--ink-3)", padding:"4px 8px" }}>취소</div>
        <div style={{ fontFamily:"var(--fh)", fontSize:14, color:"var(--ink-3)" }}>
          {editDiary ? "✏️ 일기 수정" : _dateStr}
        </div>
        <div onClick={handleSave} className="btn"
          style={{ padding:"7px 18px", background:hasContent?"var(--rose)":"var(--paper-edge)",
            color:hasContent?"white":"var(--ink-3)", borderRadius:999,
            fontSize:15, fontWeight:700, transition:"background .2s" }}>저장</div>
      </div>

      {/* ── 본문 영역 ── */}
      <div style={{ flex:1, overflowY:"auto", minHeight:0, padding:"12px 20px 8px" }}>

        {/* 역할 선택 */}
        <div style={{ display:"flex", gap:6, marginBottom:14 }}>
          {[{k:"mom",l:"엄마가",ic:I.mom},{k:"dad",l:"아빠가",ic:I.dad},{k:"both",l:"함께",ic:I.heart}].map(t=>(
            <div key={t.k} onClick={()=>setRole(t.k)} className="btn" style={{ flex:1, padding:"10px 6px",
              borderRadius:"var(--r)", background:role===t.k?"var(--ink)":"var(--paper-2)",
              color:role===t.k?"var(--paper-3)":"var(--ink-2)",
              border:role===t.k?"none":"1px solid var(--ink-line-2)",
              display:"flex", alignItems:"center", justifyContent:"center", gap:5, fontSize:15, fontWeight:600 }}>
              {cloneElement(t.ic,{width:16,height:16})} {t.l}
            </div>
          ))}
        </div>

        {/* 제목 */}
        <div style={{ marginBottom:10, paddingBottom:10, borderBottom:"1px dashed var(--paper-edge)" }}>
          <div style={{ fontFamily:"var(--fsc)", fontSize:28, color:"var(--name)", lineHeight:1.1, marginBottom:6 }}>Dear {babyName}에게,</div>
          <input value={title} onChange={e=>setTitle(e.target.value)}
            placeholder="제목을 적어주세요…"
            style={{ width:"100%", border:"none", background:"transparent", outline:"none",
              fontFamily:"var(--fs)", fontSize:18, fontWeight:700, color:"var(--ink)" }}/>
        </div>

        {/* 본문 — 자동 높이 */}
        <textarea ref={bodyRef} value={body} onChange={e=>setBody(e.target.value)}
          placeholder={`오늘 ${babyName}에게 있었던 일을 적어주세요…`}
          style={{ width:"100%", minHeight:100, border:"none", background:"transparent", outline:"none",
            resize:"none", fontFamily:"var(--fs)", fontSize:16, color:"var(--ink)", lineHeight:1.82,
            marginBottom:10, overflow:"hidden" }}/>

        {/* 스티커 표시 */}
        {stickers.length > 0 && (
          <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:10 }}>
            {stickers.map((s,i)=>(
              <div key={i} style={{ position:"relative" }}>
                <span style={{ fontSize:30 }}>{s}</span>
                <div onClick={()=>setStickers(st=>st.filter((_,j)=>j!==i))} className="btn"
                  style={{ position:"absolute", top:-4, right:-6, width:16, height:16, borderRadius:8,
                    background:"var(--ink)", color:"var(--paper-3)", fontSize:12,
                    display:"flex", alignItems:"center", justifyContent:"center", lineHeight:1 }}>×</div>
              </div>
            ))}
          </div>
        )}

        {/* 사진 스트립 */}
        {photos.length > 0 && (
          <div style={{ display:"flex", gap:8, marginBottom:10, overflowX:"auto", paddingBottom:4 }}>
            {photos.map((p,i)=>(
              <div key={i} style={{ position:"relative", flexShrink:0 }}>
                {p.url
                  ? <img src={p.url} style={{ width:80, height:80, borderRadius:6, objectFit:"cover", display:"block" }}/>
                  : <PhotoPH w={80} h={80} hue={p.hue||"rose"} rounded={6} taped={p.taped}/>
                }
                <div onClick={()=>setPhotos(ps=>ps.filter((_,j)=>j!==i))} className="btn"
                  style={{ position:"absolute", top:4, right:4, width:18, height:18, borderRadius:9,
                    background:"rgba(0,0,0,.55)", color:"white", fontSize:13,
                    display:"flex", alignItems:"center", justifyContent:"center" }}>×</div>
              </div>
            ))}
            <div onClick={()=>setSheet("photo")} className="btn"
              style={{ width:80, height:80, borderRadius:6, border:"1.5px dashed var(--paper-edge)",
                display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
                gap:3, color:"var(--ink-3)", flexShrink:0, fontSize:13 }}>
              {I.plus}<span>추가</span>
            </div>
          </div>
        )}

        {/* 영상 클립 — 실제 video 태그 */}
        {videos.length > 0 && (
          <div style={{ display:"flex", gap:8, marginBottom:10, overflowX:"auto" }}>
            {videos.map((v,i)=>(
              <div key={i} style={{ position:"relative", flexShrink:0 }}>
                {v.url
                  ? <video src={v.url} style={{ width:80, height:80, borderRadius:8, objectFit:"cover", display:"block" }}/>
                  : <div style={{ width:80, height:80, borderRadius:8, background:v.color||"#C4836A",
                      display:"flex", alignItems:"center", justifyContent:"center" }}>
                      <div style={{ fontSize:20, color:"white", opacity:.8 }}>▶</div>
                    </div>
                }
                <div onClick={()=>setVideos(vd=>vd.filter((_,j)=>j!==i))} className="btn"
                  style={{ position:"absolute", top:4, right:4, width:18, height:18, borderRadius:9,
                    background:"rgba(0,0,0,.55)", color:"white", fontSize:13,
                    display:"flex", alignItems:"center", justifyContent:"center" }}>×</div>
              </div>
            ))}
            <div onClick={()=>setSheet("video")} className="btn"
              style={{ width:80, height:80, borderRadius:8, border:"1.5px dashed var(--paper-edge)",
                display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
                gap:3, color:"var(--ink-3)", flexShrink:0, fontSize:13 }}>
              {I.plus}<span>추가</span>
            </div>
          </div>
        )}

        {/* 음성 메모 */}
        {voices.map((v,i)=>(
          <div key={i} style={{ padding:"10px 12px", background:"var(--rose-bg)", borderRadius:"var(--r)",
            display:"flex", alignItems:"center", gap:10, marginBottom:8 }}>
            <div onClick={()=>{
              if(playing===i) {
                audioElRef.current?.pause();
                setPlaying(null);
              } else {
                if(audioElRef.current) audioElRef.current.pause();
                if(v.url) {
                  const a = new Audio(v.url);
                  audioElRef.current = a;
                  a.play().catch(()=>{});
                  a.onended = () => setPlaying(null);
                  setPlaying(i);
                }
              }
            }} className="btn"
              style={{ width:32, height:32, borderRadius:16, background:"var(--rose)", color:"white",
                display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, fontSize:15 }}>
              {playing===i?"⏸":"▶"}
            </div>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:14, fontWeight:600, color:"var(--wood-dark)", marginBottom:3 }}>{v.label}</div>
              <Waveform bars={28} filled={playing===i?28:v.filled||0}/>
            </div>
            <div style={{ fontSize:14, color:"var(--ink-3)", marginRight:4 }}>{v.dur}</div>
            <div onClick={()=>setVoices(vs=>vs.filter((_,j)=>j!==i))} className="btn"
              style={{ color:"var(--danger)", opacity:.7 }}>{cloneElement(I.trash,{width:14,height:14})}</div>
          </div>
        ))}

        {/* 감정 */}
        <div style={{ marginBottom:10 }}>
          <div style={{ fontSize:13, color:"var(--ink-3)", marginBottom:6, fontWeight:600 }}>오늘의 마음</div>
          <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
            {emotions.map((e,i)=>(
              <Chip key={i} color={i===emotion?"rose":"wood"} active={i===emotion} onClick={()=>setEmotion(i)}>{e}</Chip>
            ))}
          </div>
        </div>

        {/* 태그 */}
        <div style={{ paddingBottom:8 }}>
          <div style={{ fontSize:13, color:"var(--ink-3)", marginBottom:6, fontWeight:600 }}>태그</div>
          <div style={{ display:"flex", gap:6, flexWrap:"wrap", alignItems:"center" }}>
            {tags.map((t,i)=>(
              <span key={i} style={{ display:"inline-flex", alignItems:"center", gap:4,
                padding:"3px 8px 3px 10px", borderRadius:999,
                background:"var(--rose-bg)", color:"var(--wood-dark)", fontSize:14 }}>
                {t}
                <span onClick={()=>setTags(tags.filter((_,j)=>j!==i))} className="btn"
                  style={{ color:"var(--rose)", fontWeight:700, fontSize:16, lineHeight:1 }}>×</span>
              </span>
            ))}
            {addingTag
              ? <input autoFocus value={newTag} onChange={e=>setNewTag(e.target.value)}
                  onKeyDown={e=>{ if(e.key==="Enter"&&newTag.trim()){setTags([...tags,newTag.trim().startsWith("#")?newTag.trim():"#"+newTag.trim()]);setNewTag("");setAddingTag(false);} if(e.key==="Escape")setAddingTag(false); }}
                  onBlur={()=>{ if(newTag.trim())setTags([...tags,newTag.trim().startsWith("#")?newTag.trim():"#"+newTag.trim()]);setNewTag("");setAddingTag(false); }}
                  placeholder="#태그" style={{ border:"none", borderBottom:"1.5px solid var(--rose)", background:"transparent", outline:"none", fontSize:14, width:72, color:"var(--ink)" }}/>
              : <Chip color="wood" onClick={()=>setAddingTag(true)}>+ 추가</Chip>}
          </div>
        </div>
      </div>

      {/* ── 하단 미디어 툴바 ── */}
      <div style={{ padding:"8px 14px 28px", background:"var(--paper-aged)",
        borderTop:"1px solid var(--ink-line-2)", display:"flex", alignItems:"center", gap:6, flexShrink:0 }}>
        {[
          { ic:I.photo, l:"사진",   k:"photo",   active:photos.length>0,  badge:photos.length },
          { ic:I.video, l:"동영상", k:"video",   active:videos.length>0,  badge:videos.length },
          { ic:I.mic,   l:"음성",   k:"voice",   active:voices.length>0,  badge:voices.length },
          { ic:I.heart, l:"스티커", k:"sticker", active:stickers.length>0,badge:stickers.length },
        ].map(x=>(
          <div key={x.k} onClick={()=>setSheet(x.k)} className="btn"
            style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:2,
              padding:"7px 0", borderRadius:"var(--rs)", position:"relative",
              background: x.active?"var(--rose-bg)":"var(--paper-3)",
              border: x.active?"1px solid var(--rose-soft)":"1px solid var(--paper-edge)",
              color: x.active?"var(--rose)":"var(--wood)" }}>
            {x.ic}
            <span style={{ fontSize:13, fontWeight:x.active?700:400 }}>{x.l}</span>
            {x.badge>0&&(
              <div style={{ position:"absolute", top:3, right:3, width:14, height:14, borderRadius:7,
                background:"var(--rose)", color:"white", fontSize:12, fontWeight:700,
                display:"flex", alignItems:"center", justifyContent:"center" }}>{x.badge}</div>
            )}
          </div>
        ))}
        <div onClick={handleSave} className="btn"
          style={{ width:52, height:42, borderRadius:999, background:"var(--rose)", color:"white",
            display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>{I.save}</div>
      </div>

      {/* 숨겨진 파일 입력 */}
      <input ref={camPhotoRef} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={e=>handleFileSelect(e.target.files,"photo")}/>
      <input ref={galPhotoRef} type="file" accept="image/*" multiple style={{display:"none"}} onChange={e=>handleFileSelect(e.target.files,"photo")}/>
      <input ref={camVideoRef} type="file" accept="video/*" capture="environment" style={{display:"none"}} onChange={e=>handleFileSelect(e.target.files,"video")}/>
      <input ref={galVideoRef} type="file" accept="video/*" multiple style={{display:"none"}} onChange={e=>handleFileSelect(e.target.files,"video")}/>

      {showCancel&&(
        <ConfirmModal
          message="작성 중인 내용이 있어요. 나가면 저장되지 않아요."
          sub="지금 나가면 내용이 사라져요"
          confirmLabel="나가기"
          onConfirm={()=>nav("home")}
          onCancel={()=>setShowCancel(false)}
        />
      )}
      {sheet==="photo"&&(
        <div style={{ position:"absolute", inset:0, background:"rgba(0,0,0,.45)", zIndex:200,
          display:"flex", alignItems:"flex-end", animation:"fadeIn .18s" }} onClick={()=>setSheet(null)}>
          <div style={{ width:"100%", background:"var(--paper-3)", borderRadius:"20px 20px 0 0",
            padding:"0 0 40px", animation:"slideUp .22s" }} onClick={e=>e.stopPropagation()}>
            <div style={{ display:"flex", justifyContent:"center", padding:"12px 0 0" }}>
              <div style={{ width:40, height:4, borderRadius:2, background:"var(--paper-edge)" }}/>
            </div>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"10px 20px 8px" }}>
              <div style={{ fontFamily:"var(--fs)", fontSize:17, fontWeight:700, color:"var(--ink)" }}>📷 사진 추가</div>
              <div onClick={()=>setSheet(null)} className="btn" style={{ color:"var(--ink-3)" }}>{I.close}</div>
            </div>

            {/* 폴더 선택 */}
            <div style={{ padding:"0 20px 12px" }}>
              <div style={{ fontSize:13, color:"var(--ink-3)", fontWeight:600, marginBottom:6 }}>앨범에 저장할 폴더</div>
              <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                {["일기 사진", ...(galleryFolders||[]).filter(f=>!f.fixed).map(f=>f.name)].map(fname=>(
                  <div key={fname} onClick={()=>setPhotoFolder(fname)} className="btn"
                    style={{ padding:"5px 12px", borderRadius:999, fontSize:13, fontWeight:600,
                      background:photoFolder===fname?"var(--rose)":"var(--paper-2)",
                      color:photoFolder===fname?"white":"var(--ink-2)",
                      border:photoFolder===fname?"none":"1px solid var(--paper-edge)" }}>
                    {fname}
                  </div>
                ))}
              </div>
            </div>

            <div style={{ display:"flex", gap:10, padding:"0 20px 16px" }}>
              <div onClick={()=>camPhotoRef.current?.click()} className="btn"
                style={{ flex:1, padding:"16px 0", textAlign:"center", borderRadius:14,
                  background:"linear-gradient(145deg,#E8977A,#C4836A)", color:"white", fontWeight:700, fontSize:14,
                  display:"flex", flexDirection:"column", alignItems:"center", gap:6,
                  boxShadow:"0 4px 14px rgba(196,131,106,.4)" }}>
                <span style={{ fontSize:28 }}>📷</span>카메라 촬영
              </div>
              <div onClick={()=>galPhotoRef.current?.click()} className="btn"
                style={{ flex:1, padding:"16px 0", textAlign:"center", borderRadius:14,
                  background:"var(--paper-2)", border:"1.5px solid var(--paper-edge)",
                  color:"var(--ink-2)", fontWeight:600, fontSize:14,
                  display:"flex", flexDirection:"column", alignItems:"center", gap:6 }}>
                <span style={{ fontSize:28 }}>🖼</span>앨범 선택
              </div>
            </div>
            {photos.filter(p=>p.url).length>0&&(
              <div style={{ padding:"0 20px" }}>
                <div style={{ fontSize:13, color:"var(--ink-3)", marginBottom:8 }}>추가된 사진 ({photos.filter(p=>p.url).length}장)</div>
                <div style={{ display:"flex", gap:6, overflowX:"auto" }}>
                  {photos.filter(p=>p.url).map((p,i)=>(
                    <img key={i} src={p.url} style={{ width:64, height:64, borderRadius:8, objectFit:"cover", flexShrink:0 }}/>
                  ))}
                </div>
              </div>
            )}
          </div>
        </div>
      )}

      {/* ══════════════════════════════════════
          시트 2 — 동영상 선택
      ══════════════════════════════════════ */}
      {sheet==="video"&&(
        <div style={{ position:"absolute", inset:0, background:"rgba(0,0,0,.45)", zIndex:200,
          display:"flex", alignItems:"flex-end", animation:"fadeIn .18s" }} onClick={()=>setSheet(null)}>
          <div style={{ width:"100%", background:"var(--paper-3)", borderRadius:"20px 20px 0 0",
            padding:"0 0 40px", animation:"slideUp .22s" }} onClick={e=>e.stopPropagation()}>
            <div style={{ display:"flex", justifyContent:"center", padding:"12px 0 0" }}>
              <div style={{ width:40, height:4, borderRadius:2, background:"var(--paper-edge)" }}/>
            </div>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"12px 20px 8px" }}>
              <div style={{ fontFamily:"var(--fs)", fontSize:17, fontWeight:700, color:"var(--ink)" }}>🎬 동영상 추가</div>
              <div onClick={()=>setSheet(null)} className="btn" style={{ color:"var(--ink-3)" }}>{I.close}</div>
            </div>
            <div style={{ display:"flex", gap:10, padding:"4px 20px 20px" }}>
              <div onClick={()=>camVideoRef.current?.click()} className="btn"
                style={{ flex:1, padding:"18px 0", textAlign:"center", borderRadius:14,
                  background:"linear-gradient(145deg,#3A2E2A,#5A4030)", color:"white", fontWeight:700, fontSize:15,
                  display:"flex", flexDirection:"column", alignItems:"center", gap:6,
                  boxShadow:"0 4px 14px rgba(58,46,32,.35)" }}>
                <span style={{ fontSize:30 }}>🎥</span>
                <span>동영상 촬영</span>
              </div>
              <div onClick={()=>galVideoRef.current?.click()} className="btn"
                style={{ flex:1, padding:"18px 0", textAlign:"center", borderRadius:14,
                  background:"var(--paper-2)", border:"1.5px solid var(--paper-edge)",
                  color:"var(--ink-2)", fontWeight:600, fontSize:15,
                  display:"flex", flexDirection:"column", alignItems:"center", gap:6 }}>
                <span style={{ fontSize:30 }}>📂</span>
                <span>앨범 선택</span>
              </div>
            </div>
            {videos.filter(v=>v.url).length>0&&(
              <div style={{ padding:"0 20px" }}>
                <div style={{ fontSize:13, color:"var(--ink-3)", marginBottom:8 }}>추가된 동영상 ({videos.filter(v=>v.url).length}개)</div>
                <div style={{ display:"flex", gap:6, overflowX:"auto" }}>
                  {videos.filter(v=>v.url).map((v,i)=>(
                    <video key={i} src={v.url} style={{ width:80, height:64, borderRadius:8, objectFit:"cover", flexShrink:0 }}/>
                  ))}
                </div>
              </div>
            )}
          </div>
        </div>
      )}

      {/* ══════════════════════════════════════
          시트 3 — 음성 녹음
      ══════════════════════════════════════ */}
      {sheet==="voice"&&(
        <div style={{ position:"absolute", inset:0, background:"rgba(0,0,0,.45)", zIndex:200,
          display:"flex", alignItems:"flex-end", animation:"fadeIn .18s" }} onClick={()=>{ if(!recording)setSheet(null); }}>
          <div style={{ width:"100%", background:"var(--paper-3)", borderRadius:"20px 20px 0 0",
            padding:"0 24px 36px", animation:"slideUp .22s" }} onClick={e=>e.stopPropagation()}>
            <div style={{ display:"flex", justifyContent:"center", padding:"12px 0 0" }}>
              <div style={{ width:40, height:4, borderRadius:2, background:"var(--paper-edge)" }}/>
            </div>
            <div style={{ fontFamily:"var(--fs)", fontSize:17, fontWeight:700, color:"var(--ink)", padding:"12px 0 16px", textAlign:"center" }}>
              🎙 음성 녹음
            </div>

            {/* 에러 메시지 */}
            {recError&&(
              <div style={{ background:"var(--danger-bg)", border:"1px solid var(--danger)", borderRadius:"var(--rs)",
                padding:"10px 14px", marginBottom:14, fontSize:14, color:"var(--danger)", textAlign:"center", fontWeight:600 }}>
                ⚠️ {recError}
              </div>
            )}

            {/* 타이머 */}
            <div style={{ textAlign:"center", marginBottom:14 }}>
              <div style={{ fontFamily:"var(--fs)", fontSize:44, fontWeight:700,
                color:recording?"var(--danger)":"var(--ink-3)", letterSpacing:4 }}>{fmt(recordSec)}</div>
              {recording&&<div style={{ fontSize:14, color:"var(--danger)", marginTop:4, fontWeight:600 }}>● 녹음 중</div>}
              {!recording&&!recError&&<div style={{ fontSize:13, color:"var(--ink-3)", marginTop:4 }}>버튼을 눌러 녹음 시작</div>}
            </div>

            {/* 실시간 웨이브폼 */}
            <div style={{ display:"flex", justifyContent:"center", marginBottom:20 }}>
              <div style={{ display:"flex", gap:2, alignItems:"center", height:44 }}>
                {waveData.map((h,i)=>(
                  <div key={i} style={{ width:3, borderRadius:2,
                    background:recording?"var(--rose)":"var(--paper-edge)",
                    height:h, transition:recording?"none":"height .3s" }}/>
                ))}
              </div>
            </div>

            {/* 저장된 목록 + 재생 */}
            {voices.length>0&&!recording&&(
              <div style={{ marginBottom:14 }}>
                <div style={{ fontSize:13, color:"var(--ink-3)", marginBottom:6 }}>저장된 음성 ({voices.length}개)</div>
                {voices.slice(-2).map((v,i)=>(
                  <div key={i} style={{ display:"flex", alignItems:"center", gap:8, padding:"8px 10px",
                    background:"var(--paper-2)", borderRadius:"var(--rs)", marginBottom:4 }}>
                    <div onClick={()=>{
                      if(v.url) {
                        if(playing===i) { audioElRef.current?.pause(); setPlaying(null); }
                        else {
                          if(audioElRef.current) audioElRef.current.pause();
                          const a = new Audio(v.url);
                          audioElRef.current = a;
                          a.play();
                          a.onended = () => setPlaying(null);
                          setPlaying(i);
                        }
                      }
                    }} className="btn" style={{ width:28, height:28, borderRadius:14,
                      background:playing===i?"var(--rose)":"var(--paper-edge)",
                      display:"flex", alignItems:"center", justifyContent:"center",
                      fontSize:13, color:playing===i?"white":"var(--ink-2)" }}>
                      {playing===i?"⏸":"▶"}
                    </div>
                    <span style={{ flex:1, fontSize:14, color:"var(--ink-2)" }}>{v.label}</span>
                    <span style={{ fontSize:13, color:"var(--ink-3)" }}>{v.dur}</span>
                  </div>
                ))}
              </div>
            )}

            {/* 버튼 */}
            <div style={{ display:"flex", gap:10 }}>
              {!recording
                ? <>
                    <div onClick={()=>{ if(playing!==null){audioElRef.current?.pause();setPlaying(null);} setSheet(null); }} className="btn"
                      style={{ flex:1, padding:"14px 0", textAlign:"center", background:"var(--paper-2)",
                        borderRadius:"var(--r)", border:"1px solid var(--paper-edge)", fontSize:16, fontWeight:600, color:"var(--ink-2)" }}>닫기</div>
                    <div onClick={startRecording} className="btn"
                      style={{ flex:1.5, padding:"14px 0", textAlign:"center", background:"var(--danger)",
                        borderRadius:"var(--r)", fontSize:16, fontWeight:700, color:"white",
                        display:"flex", alignItems:"center", justifyContent:"center", gap:8 }}>
                      <div style={{ width:10, height:10, borderRadius:5, background:"white" }}/>녹음 시작
                    </div>
                  </>
                : <>
                    <div onClick={cancelRecording} className="btn"
                      style={{ flex:1, padding:"14px 0", textAlign:"center", background:"var(--paper-2)",
                        borderRadius:"var(--r)", border:"1px solid var(--paper-edge)", fontSize:16, fontWeight:600, color:"var(--ink-2)" }}>취소</div>
                    <div onClick={stopRecording} className="btn"
                      style={{ flex:1.5, padding:"14px 0", textAlign:"center", background:"var(--ink)",
                        borderRadius:"var(--r)", fontSize:16, fontWeight:700, color:"var(--paper-3)",
                        display:"flex", alignItems:"center", justifyContent:"center", gap:8 }}>
                      <div style={{ width:12, height:12, borderRadius:2, background:"var(--paper-3)" }}/>완료
                    </div>
                  </>
              }
            </div>
          </div>
        </div>
      )}

      {/* ══════════════════════════════════════
          시트 4 — 스티커 선택
      ══════════════════════════════════════ */}
      {sheet==="sticker"&&(
        <div style={{ position:"absolute", inset:0, background:"rgba(0,0,0,.45)", zIndex:200,
          display:"flex", alignItems:"flex-end", animation:"fadeIn .18s" }} onClick={()=>setSheet(null)}>
          <div style={{ width:"100%", background:"var(--paper-3)", borderRadius:"20px 20px 0 0",
            padding:"0 20px 32px", animation:"slideUp .22s" }} onClick={e=>e.stopPropagation()}>
            <div style={{ display:"flex", justifyContent:"center", padding:"10px 0 0" }}>
              <div style={{ width:40, height:4, borderRadius:2, background:"var(--paper-edge)" }}/>
            </div>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"10px 0 14px" }}>
              <div style={{ fontFamily:"var(--fs)", fontSize:17, fontWeight:700, color:"var(--ink)" }}>🎀 스티커</div>
              <div onClick={()=>setSheet(null)} className="btn" style={{ color:"var(--ink-3)" }}>{I.close}</div>
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(6,1fr)", gap:10, marginBottom:16 }}>
              {STICKERS.map((s,i)=>(
                <div key={i} onClick={()=>{ setStickers(st=>[...st,s]); setSheet(null); }} className="btn"
                  style={{ height:46, borderRadius:10, background:"var(--paper-2)",
                    border:"1px solid var(--paper-edge)", display:"flex", alignItems:"center",
                    justifyContent:"center", fontSize:26 }}>{s}</div>
              ))}
            </div>
            <div style={{ fontSize:13, color:"var(--ink-3)", textAlign:"center" }}>스티커를 탭하면 일기에 추가됩니다</div>
          </div>
        </div>
      )}
    </Phone>
  );
}

/* ═══════════════════════════════════════════════════════════
   화면 3 — 일기 상세 (수정·삭제·즐겨찾기)
═══════════════════════════════════════════════════════════ */
function DetailScreen({ nav, onDelete, diaries=[], babyName="포동이" }) {
  const diary = diaries[0] || null;
  const [liked, setLiked] = useState(false);
  const [showMore, setShowMore] = useState(false);
  const [showDel, setShowDel] = useState(false);
  const [toast, setToast] = useState(null);
  const [playingIdx, setPlayingIdx] = useState(null);
  const audioRef = useRef(null);

  const showToast = (msg, icon="✓") => { setToast({msg,icon}); setTimeout(()=>setToast(null),2000); };

  const moreItems = [
    { icon:I.edit,  label:"일기 수정하기",   action:()=>nav("write", {editDiary: diary}) },
    { icon:I.share, label:"가족과 공유",      action:()=>{ showToast("가족에게 공유됐어요 🌿"); } },
    { icon:I.print, label:"인쇄 / PDF",       action:()=>nav("preview") },
    { icon:I.star,  label:"특별한 순간 등록", action:()=>{ showToast("✦ 첫 순간에 등록됐어요"); } },
    { icon:I.trash, label:"일기 삭제",        action:()=>setShowDel(true), danger:true },
  ];

  /* 날짜 포맷 */
  const _now = new Date();
  const dateLabel = diary
    ? (() => { const [m,d]=diary.date.split("/"); return `${_now.getFullYear()} · ${m}월 · ${d}일`; })()
    : `${_now.getFullYear()} · ${_now.getMonth()+1}월 · ${_now.getDate()}일`;

  /* 음성 재생 */
  const togglePlay = (url, idx) => {
    if(!url) return;
    if(playingIdx===idx) { audioRef.current?.pause(); setPlayingIdx(null); return; }
    if(audioRef.current) audioRef.current.pause();
    const a = new Audio(url);
    audioRef.current = a;
    a.play().catch(()=>{});
    a.onended = () => setPlayingIdx(null);
    setPlayingIdx(idx);
  };

  if(!diary) return (
    <Phone>
      <TopBar onBack={()=>nav("home")}/>
      <div style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:12, padding:24 }}>
        <div style={{ fontSize:48 }}>📝</div>
        <div style={{ fontFamily:"var(--fs)", fontSize:18, fontWeight:700, color:"var(--ink)", textAlign:"center" }}>아직 일기가 없어요</div>
        <div style={{ fontSize:15, color:"var(--ink-3)", textAlign:"center" }}>+ 버튼을 눌러 첫 일기를 써보세요</div>
        <div onClick={()=>nav("write")} className="btn" style={{ marginTop:8, padding:"13px 28px",
          background:"var(--rose)", borderRadius:999, color:"white", fontSize:16, fontWeight:700 }}>일기 쓰기</div>
      </div>
    </Phone>
  );

  return (
    <Phone>
      <TopBar onBack={()=>nav("home")}
        right={<>
          <div onClick={()=>{ setLiked(l=>!l); showToast(liked?"즐겨찾기 해제":"즐겨찾기 추가 ♡"); }} className="btn">
            {liked ? I.heartF : I.heart}
          </div>
          <div onClick={()=>setShowMore(true)} className="btn">{I.more}</div>
        </>}/>

      <div style={{ flex:1, overflowY:"auto", minHeight:0, padding:"0 22px 24px" }}>
        <div style={{ textAlign:"center", padding:"4px 0 14px" }}>
          <div style={{ fontFamily:"var(--fh)", fontSize:18, color:"var(--rose)" }}>{dateLabel}</div>
          <div style={{ fontSize:13, color:"var(--ink-3)", marginTop:2 }}>{babyName} · {diary.day}요일</div>
        </div>

        {/* 편지 카드 */}
        <div style={{ background:"var(--paper-3)", padding:"22px 20px 18px",
          borderRadius:"var(--r)", boxShadow:"var(--shm)", position:"relative", border:"1px solid var(--paper-edge)" }}>
          <div className="tape" style={{ top:-11, left:16 }}/>
          <div className="tape" style={{ top:-11, right:20, transform:"rotate(6deg)" }}/>
          <div style={{ fontFamily:"var(--fsc)", fontSize:32, color:"var(--name)", lineHeight:1 }}>Dear {babyName}에게,</div>
          <div style={{ fontFamily:"var(--fs)", fontSize:19, fontWeight:700, color:"var(--ink)", marginTop:12 }}>{diary.title}</div>
          {diary.body && (
            <div style={{ fontFamily:"var(--fs)", fontSize:16, lineHeight:1.82, color:"var(--ink)", marginTop:12, whiteSpace:"pre-wrap" }}>
              {diary.body}
            </div>
          )}

          {/* 사진 그리드 */}
          {diary.photos && diary.photos.filter(p=>p.url).length>0 && (
            <div style={{ display:"grid", gridTemplateColumns:diary.photos.filter(p=>p.url).length===1?"1fr":"1fr 1fr", gap:8, margin:"14px 0" }}>
              {diary.photos.filter(p=>p.url).map((p,i)=>(
                <img key={i} src={p.url} style={{ width:"100%", height:115, objectFit:"cover", borderRadius:6 }}/>
              ))}
            </div>
          )}

          {/* 동영상 */}
          {diary.videos && diary.videos.filter(v=>v.url).length>0 && (
            <div style={{ display:"flex", gap:6, margin:"10px 0", overflowX:"auto" }}>
              {diary.videos.filter(v=>v.url).map((v,i)=>(
                <video key={i} src={v.url} controls style={{ height:100, borderRadius:6, flexShrink:0 }}/>
              ))}
            </div>
          )}

          {/* 음성 목록 */}
          {diary.voices && diary.voices.filter(v=>v.url).length>0 && (
            <div style={{ display:"flex", flexDirection:"column", gap:6, margin:"10px 0" }}>
              {diary.voices.filter(v=>v.url).map((v,i)=>(
                <div key={i} style={{ padding:"10px 12px", background:"var(--paper-2)", borderRadius:10,
                  display:"flex", alignItems:"center", gap:10, border:"1px solid var(--paper-edge)" }}>
                  <div onClick={()=>togglePlay(v.url,i)} className="btn" style={{ width:30, height:30, borderRadius:15,
                    background:"var(--rose)", color:"white", display:"flex", alignItems:"center",
                    justifyContent:"center", fontSize:15, flexShrink:0 }}>{playingIdx===i?"⏸":"▶"}</div>
                  <div style={{ flex:1 }}>
                    <Waveform bars={34} filled={playingIdx===i?20:0} color="var(--wood)"/>
                    <div style={{ fontFamily:"var(--fh)", fontSize:13, color:"var(--ink-3)", marginTop:2 }}>{v.label}</div>
                  </div>
                  <div style={{ fontSize:14, color:"var(--ink-3)" }}>{v.dur}</div>
                </div>
              ))}
            </div>
          )}

          {/* 스티커 */}
          {diary.stickers && diary.stickers.length>0 && (
            <div style={{ display:"flex", gap:4, flexWrap:"wrap", margin:"8px 0" }}>
              {diary.stickers.map((s,i)=><span key={i} style={{ fontSize:24 }}>{s}</span>)}
            </div>
          )}

          <div style={{ marginTop:14, paddingTop:12, borderTop:"1px dashed var(--paper-edge)",
            display:"flex", alignItems:"center", justifyContent:"space-between" }}>
            <div style={{ display:"flex", gap:4, flexWrap:"wrap" }}>
              {(diary.tags||[]).map((t,i)=><Chip key={i} color="rose" sm>{t}</Chip>)}
            </div>
            <div style={{ fontFamily:"var(--fsc)", fontSize:22, color:"var(--name)" }}>— 엄마가</div>
          </div>
        </div>

        {/* 액션 버튼 */}
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginTop:14 }}>
          <div onClick={()=>nav("anniversary")} className="btn" style={{ padding:"12px 8px",
            background:"var(--honey-bg)", borderRadius:"var(--r)", border:"1px solid rgba(217,168,92,.3)",
            textAlign:"center", fontSize:15, fontWeight:600, color:"var(--wood-dark)" }}>✦ 기념 카드 만들기</div>
          <div onClick={()=>nav("book")} className="btn" style={{ padding:"12px 8px",
            background:"var(--paper-2)", borderRadius:"var(--r)", border:"1px solid var(--ink-line-2)",
            textAlign:"center", fontSize:15, fontWeight:600, color:"var(--ink-2)" }}>📚 포토북에 넣기</div>
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginTop:8 }}>
          <div onClick={()=>nav("write", {editDiary: diary})} className="btn" style={{ padding:"12px 8px",
            background:"var(--paper-2)", borderRadius:"var(--r)", border:"1px solid var(--ink-line-2)",
            textAlign:"center", fontSize:15, fontWeight:600, color:"var(--ink-2)",
            display:"flex", alignItems:"center", justifyContent:"center", gap:6 }}>
            {I.edit} 수정하기
          </div>
          <div onClick={()=>setShowDel(true)} className="btn" style={{ padding:"12px 8px",
            background:"var(--danger-bg)", borderRadius:"var(--r)", border:"1px solid rgba(192,57,43,.2)",
            textAlign:"center", fontSize:15, fontWeight:600, color:"var(--danger)",
            display:"flex", alignItems:"center", justifyContent:"center", gap:6 }}>
            {I.trash} 삭제하기
          </div>
        </div>
      </div>

      {showMore && <MoreSheet items={moreItems} onClose={()=>setShowMore(false)}/>}
      {showDel && <ConfirmModal message="이 일기를 삭제할까요?" onConfirm={()=>{ onDelete&&onDelete(diary?.id); nav("home"); }} onCancel={()=>setShowDel(false)}/>}
      {toast && <Toast message={toast.msg} icon={toast.icon}/>}

      <TabBar active="cal" nav={nav}/>    </Phone>
  );
}

const GALLERY_INIT_FOLDERS = [
  { name:"일기 사진", icon:"📓", hue:"rose",  fixed:true  },
  { name:"첫돌",      icon:"🎂", hue:"honey", fixed:false },
  { name:"제주여행",  icon:"🌊", hue:"sage",  fixed:false },
  { name:"병원 기록", icon:"🏥", hue:"blue",  fixed:false },
  { name:"엄마와",    icon:"👩", hue:"rose",  fixed:false },
  { name:"아빠와",    icon:"👨", hue:"honey", fixed:false },
];

/* ═══════════════════════════════════════════════════════════
   화면 4 — 갤러리 / 앨범 (완전 구현)
═══════════════════════════════════════════════════════════ */
function GalleryScreen({ nav, babyName="포동이", diaries=[], galleryPhotos=[], onAddGalleryPhotos, onDelGalleryPhoto,
  galleryFolders=GALLERY_INIT_FOLDERS, onAddFolder, onUpdateFolder, onDeleteFolder }) {

  const [view,          setView]          = useState("main");
  const [activeFolder,  setActiveFolder]  = useState(null);
  const [viewerIdx,     setViewerIdx]     = useState(0);
  const [viewerList,    setViewerList]    = useState([]);
  const [showAddSheet,  setShowAddSheet]  = useState(false);
  const [addMode,       setAddMode]       = useState(null);
  const [editingFolder, setEditingFolder] = useState(null);
  const [targetFolder,  setTargetFolder]  = useState(null);
  const [newFolderName, setNewFolderName] = useState("");
  const [toast,         setToast]         = useState(null);
  const [showSearch,    setShowSearch]    = useState(false);
  const [searchQ,       setSearchQ]       = useState("");
  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(null), 2200); };

  const folders = galleryFolders;
  const hues  = ["rose","honey","sage","plum","blue"];
  const ICONS = ["📁","🌟","🎵","🏖","🎄","🐾","🌈","❤️","🍀","🎂","✈️","🏡","🌙","🦋","🐣","🎀"];

  /* 일기 사진 추출 */
  const diaryPhotos = diaries.flatMap((d,di) =>
    (d.photos||[]).filter(p=>p.url).map((p,pi) => ({
      id:`d-${di}-${pi}`, type:"photo", url:p.url,
      name:"일기 사진", folder:"일기 사진", date:d.date||"", label:d.title||"일기",
    }))
  );
  const allMedia = [...galleryPhotos, ...diaryPhotos];
  const photosInFolder = fname => allMedia.filter(p => (p.folder||"전체") === fname);

  /* 파일 입력 */
  const camRef = useRef(null);
  const galRef = useRef(null);
  const vidRef = useRef(null);
  const handleFiles = files => {
    if (!files || !files.length) return;
    const now = new Date();
    const dateStr = `${now.getMonth()+1}/${now.getDate()}`;
    let count = 0;
    Array.from(files).forEach((f, i) => {
      const isVideo = f.type.startsWith("video");
      if (isVideo) {
        /* 동영상: Blob 자체를 IndexedDB에 저장 → 재시작 후 URL 재생성 */
        count++;
        const item = {
          id: Date.now()+i, type:"video",
          blob: f,                          // ← Blob 객체 직접 저장 (IndexedDB가 지원함)
          url: URL.createObjectURL(f),      // 현재 세션용 URL
          mimeType: f.type,
          name: f.name, size: f.size,
          folder: targetFolder || "전체",
          hue: hues[Math.floor(Math.random()*hues.length)],
          label:"동영상", date: dateStr,
        };
        onAddGalleryPhotos && onAddGalleryPhotos([item]);
        if (count === files.length) showToast(`✓ ${count}개 추가됐어요`);
      } else {
        const reader = new FileReader();
        reader.onload = ev => {
          count++;
          const item = { id:Date.now()+i, type:"photo", url:ev.target.result, name:f.name,
            folder:targetFolder||"전체", hue:hues[Math.floor(Math.random()*hues.length)],
            label:"사진", date:dateStr };
          onAddGalleryPhotos && onAddGalleryPhotos([item]);
          if (count === files.length) showToast(`✓ ${count}개 추가됐어요`);
        };
        reader.readAsDataURL(f);
      }
    });
    setShowAddSheet(false); setAddMode(null); setTargetFolder(null);
  };

  /* 폴더 추가 */
  const doAddFolder = () => {
    if (!newFolderName.trim()) return;
    const f = { name:newFolderName.trim(), icon:ICONS[folders.length%ICONS.length],
      hue:hues[folders.length%hues.length], fixed:false };
    onAddFolder && onAddFolder(f);
    showToast(`"${newFolderName}" 폴더 생성됐어요`);
    setNewFolderName(""); setAddMode(null);
  };

  /* 폴더 이름 수정 */
  const doRenameFolder = () => {
    if (!newFolderName.trim() || !editingFolder) return;
    const oldName = editingFolder.name;
    onUpdateFolder && onUpdateFolder(oldName, { name:newFolderName.trim() });
    if (activeFolder?.name === oldName) setActiveFolder(f=>({...f, name:newFolderName.trim()}));
    showToast("폴더 이름이 변경됐어요");
    setNewFolderName(""); setEditingFolder(null); setAddMode(null);
  };

  /* 폴더 삭제 */
  const doDeleteFolder = (fname) => {
    onDeleteFolder && onDeleteFolder(fname);
    if (activeFolder?.name === fname) { setView("main"); setActiveFolder(null); }
    showToast(`"${fname}" 폴더가 삭제됐어요`);
    setAddMode(null); setEditingFolder(null);
  };

  /* 검색 */
  const sq = searchQ.trim().toLowerCase();
  const searchResults = sq ? allMedia.filter(p =>
    p.name.toLowerCase().includes(sq)||(p.folder||"").toLowerCase().includes(sq)||(p.label||"").toLowerCase().includes(sq)
  ) : [];

  /* 뷰어 열기 */
  const openViewer = (list, idx) => { setViewerList(list); setViewerIdx(idx); setView("viewer"); };

  /* 공통 파일 입력 — 인라인 JSX */
  const fileInputsJSX = <>
    <input ref={camRef} type="file" accept="image/*" capture="environment" style={{display:"none"}}
      onChange={e=>{ handleFiles(e.target.files); e.target.value=""; }}/>
    <input ref={galRef} type="file" accept="image/*,video/*" multiple style={{display:"none"}}
      onChange={e=>{ handleFiles(e.target.files); e.target.value=""; }}/>
    <input ref={vidRef} type="file" accept="video/*" capture="environment" style={{display:"none"}}
      onChange={e=>{ handleFiles(e.target.files); e.target.value=""; }}/>
  </>;

  /* 추가 시트 인라인 렌더 함수 */
  const renderAddSheet = (folderTitle) => (
    <div style={{ position:"absolute", inset:0, background:"rgba(0,0,0,.45)", zIndex:200,
      display:"flex", alignItems:"flex-end", animation:"fadeIn .18s" }}
      onClick={()=>{ setShowAddSheet(false); setTargetFolder(null); }}>
      <div style={{ width:"100%", background:"var(--paper-3)", borderRadius:"20px 20px 0 0",
        padding:"0 20px 44px", animation:"slideUp .22s" }} onClick={e=>e.stopPropagation()}>
        <div style={{ display:"flex", justifyContent:"center", padding:"12px 0 8px" }}>
          <div style={{ width:40, height:4, borderRadius:2, background:"var(--paper-edge)" }}/>
        </div>
        <div style={{ fontFamily:"var(--fs)", fontSize:17, fontWeight:700, color:"var(--ink)", marginBottom:folderTitle?12:4 }}>
          {folderTitle || "📷 미디어 추가"}
        </div>
        {!folderTitle && (
          <>
            <div style={{ fontSize:13, color:"var(--ink-3)", fontWeight:600, marginBottom:8 }}>저장할 폴더</div>
            <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:16 }}>
              {[{name:"전체",icon:"🗂"}, ...folders].map(f=>(
                <div key={f.name} onClick={()=>setTargetFolder(f.name==="전체"?null:f.name)} className="btn"
                  style={{ padding:"6px 14px", borderRadius:999, fontSize:13, fontWeight:600,
                    background:targetFolder===(f.name==="전체"?null:f.name)?"var(--rose)":"var(--paper-2)",
                    color:targetFolder===(f.name==="전체"?null:f.name)?"white":"var(--ink-2)",
                    border:targetFolder===(f.name==="전체"?null:f.name)?"none":"1px solid var(--paper-edge)" }}>
                  {f.icon} {f.name}
                </div>
              ))}
            </div>
          </>
        )}
        <div style={{ display:"flex", gap:8 }}>
          <div onClick={()=>camRef.current?.click()} className="btn"
            style={{ flex:1, padding:"14px 0", borderRadius:14,
              background:"linear-gradient(145deg,#E8977A,#C4836A)", color:"white",
              fontWeight:700, fontSize:13, display:"flex", flexDirection:"column", alignItems:"center", gap:5 }}>
            <span style={{ fontSize:24 }}>📷</span>사진 촬영
          </div>
          <div onClick={()=>vidRef.current?.click()} className="btn"
            style={{ flex:1, padding:"14px 0", borderRadius:14,
              background:"linear-gradient(145deg,#5A4030,#3A2010)", color:"white",
              fontWeight:700, fontSize:13, display:"flex", flexDirection:"column", alignItems:"center", gap:5 }}>
            <span style={{ fontSize:24 }}>🎥</span>동영상 촬영
          </div>
          <div onClick={()=>galRef.current?.click()} className="btn"
            style={{ flex:1, padding:"14px 0", borderRadius:14,
              background:"var(--paper-2)", border:"1.5px solid var(--paper-edge)",
              color:"var(--ink-2)", fontWeight:600, fontSize:13, display:"flex", flexDirection:"column", alignItems:"center", gap:5 }}>
            <span style={{ fontSize:24 }}>🖼</span>갤러리
          </div>
        </div>
      </div>
    </div>
  );

  /* 폴더 시트 인라인 렌더 함수 */
  const renderFolderSheet = () => {
    const isRename = addMode==="rename";
    return (
      <div style={{ position:"absolute", inset:0, background:"rgba(0,0,0,.45)", zIndex:200,
        display:"flex", alignItems:"flex-end", animation:"fadeIn .18s" }}
        onClick={()=>{ setAddMode(null); setNewFolderName(""); setEditingFolder(null); }}>
        <div style={{ width:"100%", background:"var(--paper-3)", borderRadius:"20px 20px 0 0",
          padding:"0 20px 44px", animation:"slideUp .22s" }} onClick={e=>e.stopPropagation()}>
          <div style={{ display:"flex", justifyContent:"center", padding:"12px 0 8px" }}>
            <div style={{ width:40, height:4, borderRadius:2, background:"var(--paper-edge)" }}/>
          </div>
          <div style={{ fontFamily:"var(--fs)", fontSize:17, fontWeight:700, color:"var(--ink)", marginBottom:14 }}>
            {isRename ? "✏️ 폴더 이름 변경" : "📁 새 폴더 만들기"}
          </div>
          <input autoFocus value={newFolderName} onChange={e=>setNewFolderName(e.target.value)}
            onKeyDown={e=>{ if(e.key==="Enter") isRename ? doRenameFolder() : doAddFolder(); }}
            placeholder={isRename ? `현재: ${editingFolder?.name}` : "폴더 이름 입력…"}
            style={{ width:"100%", padding:"12px 14px", borderRadius:"var(--rs)",
              border:"1.5px solid var(--rose-soft)", background:"var(--paper-2)",
              fontSize:17, fontFamily:"var(--fs)", outline:"none", color:"var(--ink)", marginBottom:12 }}/>
          {isRename && !editingFolder?.fixed && (
            <div onClick={()=>doDeleteFolder(editingFolder?.name)} className="btn"
              style={{ width:"100%", padding:"11px 0", textAlign:"center", borderRadius:"var(--r)",
                background:"var(--danger-bg)", border:"1px solid rgba(192,57,43,.2)",
                fontSize:14, fontWeight:600, color:"var(--danger)", marginBottom:10 }}>
              🗑 이 폴더 삭제하기
            </div>
          )}
          <div style={{ display:"flex", gap:8 }}>
            <div onClick={()=>{ setAddMode(null); setNewFolderName(""); setEditingFolder(null); }} className="btn"
              style={{ flex:1, padding:"13px 0", textAlign:"center", background:"var(--paper-2)",
                borderRadius:"var(--r)", border:"1px solid var(--paper-edge)", fontSize:15, fontWeight:600, color:"var(--ink-2)" }}>취소</div>
            <div onClick={isRename ? doRenameFolder : doAddFolder} className="btn"
              style={{ flex:1.5, padding:"13px 0", textAlign:"center", background:"var(--rose)",
                borderRadius:"var(--r)", fontSize:15, fontWeight:700, color:"white" }}>
              {isRename ? "변경하기" : "만들기"}
            </div>
          </div>
        </div>
      </div>
    );
  };

  /* ── 뷰어 ── */
  if (view === "viewer") {
    const cur = viewerList[viewerIdx];
    return (
      <Phone>
        <div style={{ flex:1, background:"#0A0A0A", display:"flex", flexDirection:"column", position:"relative" }}>
          {/* 상단 — 뒤로가기 + 카운터 */}
          <div style={{ position:"absolute", top:0, left:0, right:0, zIndex:10,
            display:"flex", justifyContent:"space-between", alignItems:"center", padding:"52px 12px 14px",
            background:"linear-gradient(to bottom, rgba(0,0,0,.75), transparent)" }}>
            <div onClick={()=>setView(activeFolder?"folder":"main")} className="btn"
              style={{ display:"flex", alignItems:"center", gap:6, padding:"7px 14px",
                background:"rgba(255,255,255,.18)", borderRadius:999, backdropFilter:"blur(4px)" }}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round"><path d="M19 12H5m7-7-7 7 7 7"/></svg>
              <span style={{ color:"white", fontSize:15, fontWeight:600 }}>뒤로</span>
            </div>
            <div style={{ color:"rgba(255,255,255,.8)", fontSize:14 }}>{viewerIdx+1} / {viewerList.length}</div>
            <div style={{ width:80 }}/>
          </div>
          <div style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center", overflow:"hidden" }}>
            {cur?.type==="video"
              ? (cur.url ? <video key={cur.id} src={cur.url} controls playsInline autoPlay
                  style={{ maxWidth:"100%", maxHeight:"100%", objectFit:"contain", background:"#000" }}/>

        {/* 폴더 */}
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>

          </div>
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:8 }}>
          {folders.map(f => {
            const fps = photosInFolder(f.name);
            return (
              <div key={f.name} style={{ background:"var(--paper-2)", borderRadius:14,
                border:"1px solid var(--paper-edge)", overflow:"hidden" }}>
                <div onClick={()=>{ setActiveFolder(f); setView("folder"); }} className="btn">
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:2, height:90 }}>

                      const p = fps[idx];

                        <div key={idx} style={{ overflow:"hidden", background:"var(--paper-3)" }}>
                          {p.type==="video"
                            ? <video src={p.url} preload="metadata" style={{ width:"100%", height:"100%", objectFit:"cover" }}/>
                            : <img src={p.url} style={{ width:"100%", height:"100%", objectFit:"cover" }}/>}
                        </div>
                      ) : (
                        <div key={idx} style={{ background:"var(--paper-3)", display:"flex", alignItems:"center", justifyContent:"center" }}>
                          {idx===0 && <span style={{ fontSize:22, opacity:.35 }}>{f.icon}</span>}
                        </div>
                      );
                    })}
                  </div>
                  <div style={{ padding:"8px 10px 8px" }}>
                    <div style={{ display:"flex", alignItems:"center", gap:5 }}>
                      <span style={{ fontSize:14 }}>{f.icon}</span>
                      <div style={{ fontSize:14, fontWeight:700, color:"var(--ink)", flex:1 }}>{f.name}</div>
                      {!f.fixed && (
                        <div onClick={e=>{ e.stopPropagation(); setEditingFolder(f); setNewFolderName(f.name); setAddMode("rename"); }} className="btn"
                          style={{ fontSize:11, color:"var(--ink-3)", padding:"2px 6px",
                            borderRadius:6, background:"var(--paper-edge)", lineHeight:1.4 }}>✏️</div>
                      )}
                    </div>
                    <div style={{ fontSize:12, color:"var(--ink-3)", marginTop:1 }}>{fps.length}개</div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* 검색 */}
      {showSearch && (
        <div style={{ position:"absolute", inset:0, background:"var(--paper)", zIndex:250,
          display:"flex", flexDirection:"column", animation:"fadeIn .18s" }}>
          <div style={{ padding:"54px 16px 10px", flexShrink:0 }}>
            <div style={{ display:"flex", alignItems:"center", gap:10, background:"var(--paper-2)",
              borderRadius:999, padding:"10px 16px", border:"1.5px solid var(--rose-soft)" }}>
              {cloneElement(I.search,{width:16,height:16,color:"var(--rose)"})}
              <input autoFocus value={searchQ} onChange={e=>setSearchQ(e.target.value)}
                placeholder="사진·폴더 검색…"
                style={{ flex:1, border:"none", background:"transparent", outline:"none", fontSize:16, color:"var(--ink)" }}/>
              <div onClick={()=>{ setShowSearch(false); setSearchQ(""); }} className="btn"
                style={{ color:"var(--ink-3)", fontSize:13, fontWeight:600 }}>취소</div>
            </div>
          </div>
          <div style={{ flex:1, overflowY:"auto", padding:"0 16px 20px" }}>
            {searchQ.trim() && (
              <>
                <div style={{ fontSize:13, color:"var(--ink-3)", marginBottom:10 }}>결과 {searchResults.length}개</div>
                {searchResults.length===0
                  ? <div style={{ textAlign:"center", padding:"40px 0", fontSize:14, color:"var(--ink-3)" }}>검색 결과가 없어요</div>
                  : <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:3 }}>
                      {searchResults.map((p,i)=>(
                        <div key={p.id} onClick={()=>{ setShowSearch(false); openViewer(searchResults,i); }} className="btn"
                          style={{ position:"relative", aspectRatio:"1", borderRadius:6, overflow:"hidden", background:"var(--paper-2)" }}>
                          {p.type==="video"
                            ? <video src={p.url} preload="metadata" style={{ width:"100%", height:"100%", objectFit:"cover" }}/>
                            : <img src={p.url} style={{ width:"100%", height:"100%", objectFit:"cover" }}/>}
                        </div>
                      ))}
                    </div>
                }
              </>
            )}
          </div>
        </div>
      )}

      {showAddSheet && renderAddSheet(null)}
      {(addMode==="folder"||addMode==="rename") && renderFolderSheet()}
      {toast && <Toast message={toast}/>}
      <TabBar active="gallery" nav={nav}/>
    </Phone>
  );
}

  const hDays = (() => { const f=new Date(hCalY,hCalM,1).getDay(); const l=new Date(hCalY,hCalM+1,0).getDate(); const c=[]; for(let i=0;i<f;i++)c.push(null); for(let d=1;d<=l;d++)c.push(d); return c; })();
  const hIsSel = d => d && hSel.getFullYear()===hCalY && hSel.getMonth()===hCalM && hSel.getDate()===d;
  const hIsToday = d => d && _ht.getFullYear()===hCalY && _ht.getMonth()===hCalM && _ht.getDate()===d;

  const doDelete = id => { onDelHospRecord && onDelHospRecord(id); setDelId(null); showToast("기록이 삭제됐습니다"); };

        background:"var(--rose-bg)", borderRadius:"var(--r)", border:"1px solid rgba(196,131,106,.28)",
        display:"flex", alignItems:"center", gap:12 }}>
        <div style={{ width:44, height:44, borderRadius:10, background:"var(--rose)", color:"white",
          display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", lineHeight:1, flexShrink:0 }}>

        <div style={{ flex:1 }}>
          <div style={{ fontSize:13, color:"var(--rose)", fontWeight:600 }}>🔔 다음 일정 · {(()=>{const d=Math.ceil((new Date(2026,5,8)-new Date())/86400000);return d>0?`D-${d}`:"오늘!";})()}</div>

          <div key={r.id} style={{ display:"flex", gap:12, marginBottom:10 }}>

              <div style={{ fontSize:12, color:"var(--ink-3)" }}>{r.y}</div>
              <div style={{ fontFamily:"var(--fs)", fontSize:17, fontWeight:700, color:"var(--ink)" }}>{r.d}</div>
            </div>
            <div style={{ flex:1, padding:"12px 14px", background:editId===r.id?"var(--honey-bg)":"var(--paper-2)",
              borderRadius:"var(--r)", border:"1px solid var(--ink-line-2)", position:"relative" }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                <div style={{ flex:1 }}>
                  <div style={{ fontFamily:"var(--fs)", fontSize:15, fontWeight:700, color:"var(--ink)" }}>{r.type}</div>
                  <div style={{ fontSize:13, color:"var(--ink-3)", marginTop:2 }}>{r.doc}</div>
                </div>
                <div style={{ display:"flex", gap:8, alignItems:"center", flexShrink:0, marginLeft:8 }}>
                  <Chip color={r.tag} sm>{r.tag==="rose"?"검진":r.tag==="honey"?"접종":"진료"}</Chip>
                  <div onClick={()=>setEditId(editId===r.id?null:r.id)} className="btn" style={{ color:"var(--ink-3)" }}>{cloneElement(I.edit,{width:15,height:15})}</div>
                  <div onClick={()=>setDelId(r.id)} className="btn" style={{ color:"var(--danger)" }}>{cloneElement(I.trash,{width:15,height:15})}</div>
                </div>
              </div>
              {r.vitals&&(
                <div style={{ display:"flex", gap:10, margin:"8px 0", paddingTop:8, borderTop:"1px dashed var(--paper-edge)" }}>
                  <span style={{ fontSize:13 }}><span style={{color:"var(--ink-3)"}}>키 </span><b>{r.vitals.h}</b></span>
                  <span style={{ fontSize:13 }}><span style={{color:"var(--ink-3)"}}>몸무게 </span><b>{r.vitals.w}</b></span>
                  <span style={{ fontSize:13 }}><span style={{color:"var(--ink-3)"}}>머리 </span><b>{r.vitals.head}</b></span>
                </div>
              )}
              {editId===r.id ? (
                <div style={{ marginTop:8 }}>
                  <textarea defaultValue={r.note}
                    style={{ width:"100%", border:"1px solid var(--paper-edge)", borderRadius:"var(--rs)",
                      background:"var(--paper-3)", padding:"6px 8px", fontSize:14, fontFamily:"var(--fn)",
                      outline:"none", resize:"none", minHeight:60 }}/>
                  <div style={{ display:"flex", gap:6, marginTop:6 }}>
                    <div onClick={()=>{ setEditId(null); showToast("기록이 저장됐습니다 ✓"); }} className="btn"
                      style={{ flex:1, padding:"7px 0", textAlign:"center", background:"var(--rose)",
                        color:"white", borderRadius:"var(--rs)", fontSize:15, fontWeight:600 }}>저장</div>
                    <div onClick={()=>setEditId(null)} className="btn"
                      style={{ flex:1, padding:"7px 0", textAlign:"center", background:"var(--paper-3)",
                        border:"1px solid var(--paper-edge)", borderRadius:"var(--rs)", fontSize:15, color:"var(--ink-2)" }}>취소</div>
                  </div>
                </div>
              ):(
                <div style={{ fontSize:14, color:"var(--ink-2)", marginTop:r.vitals?0:6, lineHeight:1.5, fontFamily:"var(--fn)" }}>{r.note}</div>
              )}
            </div>
          </div>
        ))}
      </div>

      {/* 새 기록 추가 시트 */}
      {showAdd&&(
        <div style={{ position:"absolute", inset:0, background:"rgba(0,0,0,.4)", zIndex:200,
          display:"flex", alignItems:"flex-end", animation:"fadeIn .18s" }} onClick={()=>setShowAdd(false)}>
          <div style={{ width:"100%", background:"var(--paper-3)", borderRadius:"20px 20px 0 0",
            padding:"0 20px 36px", animation:"slideUp .22s", maxHeight:"85vh", overflowY:"auto" }} onClick={e=>e.stopPropagation()}>
            <div style={{ display:"flex", justifyContent:"center", padding:"12px 0 8px" }}>
              <div style={{ width:40, height:4, borderRadius:2, background:"var(--paper-edge)" }}/>
            </div>
            <div style={{ fontFamily:"var(--fs)", fontSize:18, fontWeight:700, color:"var(--ink)", marginBottom:12 }}>🏥 새 기록 추가</div>
            <div style={{ fontSize:13, color:"var(--ink-3)", fontWeight:600, marginBottom:5 }}>날짜</div>
            <div onClick={()=>setHShowCal(v=>!v)} className="btn" style={{ display:"flex", alignItems:"center", justifyContent:"space-between",
              padding:"10px 13px", borderRadius:"var(--rs)", marginBottom:hShowCal?0:10,
              border:"1.5px solid "+(hShowCal?"var(--rose)":"var(--paper-edge)"), background:"var(--paper-2)" }}>
