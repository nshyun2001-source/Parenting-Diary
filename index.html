              <span style={{ color:"var(--rose)", fontSize:12, fontWeight:700 }}>{hShowCal?"▲":"▼"}</span>
            </div>
            {hShowCal&&(
              <div style={{ background:"var(--paper-3)", border:"1.5px solid var(--rose)", borderTop:"none", borderRadius:"0 0 8px 8px", marginBottom:10, padding:"8px 10px 10px" }}>
                <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:6 }}>
                  <div onClick={()=>{ const d=new Date(hCalY,hCalM-1,1); setHCalY(d.getFullYear()); setHCalM(d.getMonth()); }} className="btn" style={{ padding:"4px 10px", fontSize:18, color:"var(--rose)", fontWeight:700 }}>‹</div>
                  <div style={{ fontFamily:"var(--fs)", fontSize:14, fontWeight:700, color:"var(--ink)" }}>{hCalY}년 {HMON[hCalM]}</div>
                  <div onClick={()=>{ const d=new Date(hCalY,hCalM+1,1); setHCalY(d.getFullYear()); setHCalM(d.getMonth()); }} className="btn" style={{ padding:"4px 10px", fontSize:18, color:"var(--rose)", fontWeight:700 }}>›</div>
                </div>
                <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", marginBottom:3 }}>
                  {HDOW.map((d,i)=><div key={d} style={{ textAlign:"center", fontSize:10, fontWeight:700, color:i===0?"#E05A5A":i===6?"#4A7AAA":"var(--ink-3)" }}>{d}</div>)}
                </div>
                <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:2 }}>
                  {hDays.map((d,i)=>(
                    <div key={i} onClick={()=>hPick(d)} className={d?"btn":""}
                      style={{ textAlign:"center", padding:"4px 0", borderRadius:5, fontSize:12,
                        fontWeight:hIsSel(d)?700:hIsToday(d)?600:400,
                        background:hIsSel(d)?"var(--rose)":hIsToday(d)?"var(--rose-bg)":"transparent",
                        color:hIsSel(d)?"white":!d?"transparent":(i%7===0)?"#E05A5A":(i%7===6)?"#4A7AAA":"var(--ink)" }}>
                      {d||""}
                    </div>
                  ))}
                </div>
              </div>
            )}
            <div style={{ fontSize:13, color:"var(--ink-3)", fontWeight:600, marginBottom:5 }}>종류</div>
            <div style={{ display:"flex", gap:5, marginBottom:10, flexWrap:"wrap" }}>
              {[{k:"rose",l:"검진"},{k:"honey",l:"접종"},{k:"sage",l:"진료"},{k:"plum",l:"예약"},{k:"blue",l:"기타"}].map(t=>(
                <div key={t.k} onClick={()=>setNewTag(t.k)} className="btn"
                  style={{ padding:"6px 13px", borderRadius:999, fontSize:13, fontWeight:600,
                    background:newTag===t.k?"var(--rose)":"var(--paper-2)", color:newTag===t.k?"white":"var(--ink-2)",
                    border:newTag===t.k?"none":"1px solid var(--paper-edge)" }}>{t.l}</div>
              ))}
            </div>
            <div style={{ fontSize:13, color:"var(--ink-3)", fontWeight:600, marginBottom:5 }}>진료 내용</div>
            <input value={newType} onChange={e=>setNewType(e.target.value)} placeholder="예) 예방접종 DTaP, 영유아검진…"
              style={{ width:"100%", padding:"10px 12px", borderRadius:"var(--rs)", border:"1.5px solid var(--paper-edge)", background:"var(--paper-2)", fontSize:14, fontFamily:"var(--fn)", outline:"none", marginBottom:10, color:"var(--ink)" }}/>
            <div style={{ fontSize:13, color:"var(--ink-3)", fontWeight:600, marginBottom:5 }}>병원명</div>
            <input value={newDoc} onChange={e=>setNewDoc(e.target.value)} placeholder="예) 따뜻한 소아과…"
              style={{ width:"100%", padding:"10px 12px", borderRadius:"var(--rs)", border:"1.5px solid var(--paper-edge)", background:"var(--paper-2)", fontSize:14, fontFamily:"var(--fn)", outline:"none", marginBottom:10, color:"var(--ink)" }}/>
            <div style={{ fontSize:13, color:"var(--ink-3)", fontWeight:600, marginBottom:5 }}>메모</div>
            <textarea value={newNote} onChange={e=>setNewNote(e.target.value)} placeholder="특이사항, 처방 내용 등…"
              style={{ width:"100%", padding:"10px 12px", borderRadius:"var(--rs)", border:"1.5px solid var(--paper-edge)", background:"var(--paper-2)", fontSize:13, fontFamily:"var(--fn)", outline:"none", resize:"none", minHeight:65, marginBottom:12, color:"var(--ink)" }}/>
            <div style={{ display:"flex", gap:8 }}>
              <div onClick={()=>setShowAdd(false)} className="btn" style={{ flex:1, padding:"13px 0", textAlign:"center", background:"var(--paper-2)", borderRadius:"var(--r)", border:"1px solid var(--paper-edge)", fontSize:15, fontWeight:600, color:"var(--ink-2)" }}>취소</div>
              <div onClick={doAdd} className="btn" style={{ flex:1.5, padding:"13px 0", textAlign:"center", background:"var(--rose)", borderRadius:"var(--r)", fontSize:15, fontWeight:700, color:"white" }}>저장하기</div>
            </div>
          </div>
        </div>
      )}

      {delId&&<ConfirmModal message="이 기록을 삭제할까요?" onConfirm={()=>doDelete(delId)} onCancel={()=>setDelId(null)}/>}
      {toast&&<Toast message={toast}/>}

      <TabBar active="growth" nav={nav}/>    </Phone>
  );
}

/* ═══════════════════════════════════════════════════════════
   화면 6 — 성장 그래프
═══════════════════════════════════════════════════════════ */
function GrowthScreen({ nav, babyName="포동이", babyYear=2025, babyMonth=3, babyDay=10 }) {
  const [tab, setTab] = useState(0);
  const [showAdd, setShowAdd] = useState(false);
  const [toast, setToast] = useState(null);
  const showToast = msg=>{ setToast(msg); setTimeout(()=>setToast(null),2000); };

  const tabs = ["키","몸무게","머리둘레","치아"];
  const data = [{m:1,h:53},{m:2,h:56},{m:3,h:60},{m:4,h:63},{m:6,h:66},{m:8,h:70},{m:10,h:72.5},{m:12,h:74.2},{m:14,h:76}];
  const W=280,H=155,pX=24,pY=14;
  const xs=m=>pX+m/14*(W-pX*2);
  const ysH=h=>H-pY-(h-50)/30*(H-pY*2);
  const path=data.map((d,i)=>`${i?"L":"M"}${xs(d.m).toFixed(1)},${ysH(d.h).toFixed(1)}`).join(" ");
  const area=`${path} L${xs(14)},${H-pY} L${xs(1)},${H-pY} Z`;

  const [milestones, setMilestones] = useState([
    {age:"54일",what:"첫 미소",d:"2025.5.10"},
    {age:"4개월",what:"첫 뒤집기",d:"2025.7.2"},
    {age:"7개월",what:"첫 이가 났어요",d:"2025.10.4"},
    {age:"11개월",what:"첫 걸음",d:"2026.2.18"},
    {age:"14개월",what:"첫 단어 — 엄마",d:"2026.5.10",hl:true},
  ]);
  const [newMilestone, setNewMilestone] = useState("");

  return (
    <Phone>
      <div style={{ padding:"54px 20px 6px", flexShrink:0 }}>
        <div style={{ fontFamily:"var(--fh)", fontSize:16, color:"var(--rose)" }}>growth</div>
        <div style={{ fontFamily:"var(--fs)", fontSize:24, fontWeight:700, color:"var(--ink)" }}>{babyName}의 성장</div>
      </div>
      <div style={{ display:"flex", gap:6, padding:"6px 20px 10px", overflowX:"auto", flexShrink:0 }}>
        {tabs.map((t,i)=><Chip key={i} color={i===tab?"ink":"wood"} active={i===tab} onClick={()=>setTab(i)}>{t}</Chip>)}
      </div>

      <div style={{ flex:1, overflowY:"auto", minHeight:0, padding:"0 20px 20px" }}>
        {/* 그래프 카드 */}
        <div style={{ background:"var(--paper-3)", padding:16, borderRadius:"var(--r)",
          border:"1px solid var(--paper-edge)", marginBottom:14 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-end" }}>
            <div>
              <div style={{ fontSize:13, color:"var(--ink-3)" }}>현재 {tabs[tab]} · 14개월</div>
              <div style={{ display:"flex", alignItems:"baseline", gap:4, marginTop:4 }}>
                <span style={{ fontFamily:"var(--fs)", fontSize:38, fontWeight:700, color:"var(--ink)" }}>
                  {["76.0","9.8","46.8","8"][tab]}
                </span>
                <span style={{ fontSize:16, color:"var(--ink-2)" }}>{["cm","kg","cm","개"][tab]}</span>
              </div>
              <div style={{ fontFamily:"var(--fh)", fontSize:15, color:"var(--rose)", marginTop:2 }}>
                {["또래 평균보다 1.2cm 큼 · 상위 38%","또래 평균과 동일 · 50%","정상 범위 · 45%","정상 범위"][tab]}
              </div>
            </div>
            <div style={{ textAlign:"right" }}>
              <div style={{ fontSize:12, color:"var(--ink-3)" }}>1년 전 대비</div>
              <div style={{ fontFamily:"var(--fs)", fontSize:19, fontWeight:700, color:"var(--sage)" }}>
                {["+23cm","+3.3kg","+5cm","+8개"][tab]}
              </div>
            </div>
          </div>
          <svg width="100%" height={H} viewBox={`0 0 ${W} ${H}`} style={{ marginTop:10 }}>
            <defs><linearGradient id="hg" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="#C4836A" stopOpacity=".35"/>
              <stop offset="100%" stopColor="#C4836A" stopOpacity="0"/>
            </linearGradient></defs>
            {[0,1,2,3].map(i=><line key={i} x1={pX} x2={W-pX} y1={pY+i*((H-pY*2)/3)} y2={pY+i*((H-pY*2)/3)} stroke="rgba(58,46,32,.07)" strokeDasharray="2 4"/>)}
            <path d={`M${xs(1)},${ysH(54)} L${xs(14)},${ysH(78)} L${xs(14)},${ysH(72)} L${xs(1)},${ysH(50)} Z`} fill="rgba(143,166,138,.18)"/>
            <path d={area} fill="url(#hg)"/>
            <path d={path} fill="none" stroke="#C4836A" strokeWidth="2" strokeLinejoin="round"/>
            {data.map((d,i)=><circle key={i} cx={xs(d.m)} cy={ysH(d.h)} r="3" fill="#C4836A" stroke="white" strokeWidth="1.5"/>)}
            {[1,4,8,12,14].map(m=><text key={m} x={xs(m)} y={H-2} fontSize="9" fill="rgba(58,46,32,.5)" textAnchor="middle">{m}m</text>)}
          </svg>
          <div style={{ display:"flex", gap:12, marginTop:6, fontSize:12, color:"var(--ink-3)" }}>
            <span style={{ display:"flex", alignItems:"center", gap:4 }}><span style={{ display:"inline-block", width:10, height:2, background:"var(--rose)" }}/> 우리 {babyName}</span>
            <span style={{ display:"flex", alignItems:"center", gap:4 }}><span style={{ display:"inline-block", width:10, height:8, background:"rgba(143,166,138,.4)" }}/> WHO 표준</span>
          </div>
        </div>

        {/* 첫 순간들 */}
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:10 }}>
          <div style={{ fontFamily:"var(--fs)", fontSize:16, fontWeight:700, color:"var(--ink)" }}>✦ 첫 순간들</div>
          <div onClick={()=>setShowAdd(true)} className="btn" style={{ display:"flex", alignItems:"center", gap:4, color:"var(--rose)", fontSize:14 }}>
            {cloneElement(I.plus,{width:14,height:14})} 추가
          </div>
        </div>
        {milestones.map((m,i)=>(
          <div key={i} style={{ display:"flex", gap:12, padding:"8px 12px",
            background:m.hl?"var(--rose-bg)":"transparent",
            borderRadius:"var(--rs)", marginBottom:4, alignItems:"center" }}>
            <div style={{ width:44, fontFamily:"var(--fs)", fontSize:14, fontWeight:700, color:"var(--rose)" }}>{m.age}</div>
            <div style={{ flex:1, fontFamily:"var(--fs)", fontSize:15, fontWeight:m.hl?700:500, color:"var(--ink)" }}>{m.what}</div>
            <div style={{ fontFamily:"var(--fh)", fontSize:13, color:"var(--ink-3)" }}>{m.d}</div>
            <div onClick={()=>{ setMilestones(ms=>ms.filter((_,j)=>j!==i)); showToast("삭제됐습니다"); }}
              className="btn" style={{ color:"var(--ink-3)" }}>{cloneElement(I.trash,{width:14,height:14})}</div>
          </div>
        ))}
      </div>

      {/* 새 순간 추가 시트 */}
      {showAdd&&(
        <div style={{ position:"absolute", inset:0, background:"rgba(0,0,0,.4)", zIndex:200,
          display:"flex", alignItems:"flex-end", animation:"fadeIn .18s" }} onClick={()=>setShowAdd(false)}>
          <div style={{ width:"100%", background:"var(--paper-3)", borderRadius:"20px 20px 0 0",
            padding:"20px 20px 36px", animation:"slideUp .22s" }} onClick={e=>e.stopPropagation()}>
            <div style={{ fontFamily:"var(--fs)", fontSize:18, fontWeight:700, color:"var(--ink)", marginBottom:14 }}>첫 순간 기록하기</div>
            <input placeholder="예) 첫 박수, 첫 계단 오르기…"
              value={newMilestone} onChange={e=>setNewMilestone(e.target.value)}
              style={{ width:"100%", padding:"10px 12px", borderRadius:"var(--rs)",
                border:"1.5px solid var(--paper-edge)", background:"var(--paper-2)", fontSize:16,
                fontFamily:"var(--fn)", outline:"none", marginBottom:14, color:"var(--ink)" }}/>
            <div style={{ display:"flex", gap:8 }}>
              <div onClick={()=>setShowAdd(false)} className="btn" style={{ flex:1, padding:"13px 0",
                textAlign:"center", background:"var(--paper-2)", borderRadius:"var(--r)",
                border:"1px solid var(--paper-edge)", fontSize:16, fontWeight:600, color:"var(--ink-2)" }}>취소</div>
              <div onClick={()=>{ if(!newMilestone.trim()) return;
                setMilestones(ms=>[...ms,{age:`${babyName}`,what:newMilestone,d:new Date().toLocaleDateString("ko-KR",{year:"numeric",month:"numeric",day:"numeric"}).replace(/ /g,"")}]);
                setNewMilestone(""); setShowAdd(false); showToast("첫 순간이 기록됐어요 ✦"); }}
                className="btn" style={{ flex:1.5, padding:"13px 0", textAlign:"center",
                  background:"var(--rose)", borderRadius:"var(--r)", fontSize:16, fontWeight:700, color:"white" }}>저장하기</div>
            </div>
          </div>
        </div>
      )}

      {toast&&<Toast message={toast}/>}
      <TabBar active="growth" nav={nav}/>
    </Phone>
  );
}

/* ═══════════════════════════════════════════════════════════
   화면 7 — 시기별 보기
═══════════════════════════════════════════════════════════ */
function StagesScreen({ nav, babyName="포동이", babyYear=2025, babyMonth=3, babyDay=10, diaries=[], hospitalRecords=[] }) {
  const _sn = new Date();
  const _sb = new Date(babyYear, babyMonth-1, babyDay);
  const _sDays = Math.max(0, Math.floor((_sn - _sb) / 86400000));
  const _sMonths = Math.floor(_sDays / 30.4375);
  const _sDaysRem = _sDays - Math.floor(_sMonths * 30.4375);
  const _sAgeStr = `${_sMonths}개월 ${_sDaysRem}일`;
  const [tab, setStagesTab] = useState(0);
  const STAGE_TABS = ["전체","0~3개월","4~6개월","7~12개월","12개월~"];
  const stages = [
    { k:"임신", sub:"40주", range:"−9개월 ~ 0", count:87, done:true, emoji:"🤍", color:"#D9A85C" },
    { k:"영아", sub:"0–12개월", range:"0 ~ 1세", count:318, done:true, emoji:"🍼", color:"#E8B79E" },
    { k:"유아", sub:"1–3세", range:"1세 ~ 3세", count:21, current:true, emoji:"🎈", color:"#C4836A" },
    { k:"아동", sub:"4–7세", range:"4세 ~ 7세", count:0, soon:true, emoji:"🌳", color:"#8FA68A" },
    { k:"초등", sub:"8–13세", range:"초등 1~6학년", count:0, soon:true, emoji:"✏️", color:"#8E6680" },
    { k:"청소년", sub:"14–19세", range:"중·고등", count:0, soon:true, emoji:"🌙", color:"#5C7A8E" },
  ];
  return (
    <Phone>
      <TopBar title={`${babyName}의 시간`} onBack={()=>nav("home")} right={<Chip color="rose">{_sAgeStr}째</Chip>}/>

      <div style={{ margin:"12px 20px 10px", padding:"12px 14px", background:"var(--paper-3)",
        borderRadius:"var(--r)", border:"1px solid var(--paper-edge)", flexShrink:0 }}>
        <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}>
          <div style={{ fontFamily:"var(--fh)", fontSize:15, color:"var(--ink-2)" }}>지금까지의 여정</div>
          <div style={{ fontSize:13, color:"var(--ink-3)" }}>총 {_sDays}일 · {diaries.length + 426} 기록</div>
        </div>
        <div style={{ display:"flex", height:10, borderRadius:5, overflow:"hidden", background:"var(--paper-aged)" }}>
          {stages.map((s,i)=><div key={s.k} style={{ width:`${[9,11,22,22,22,14][i]}%`,
            background:s.done||s.current?s.color:"transparent",
            opacity:s.current?1:s.done?.7:.15,
            borderRight:i<5?"1.5px solid var(--paper-aged)":"none" }}/>)}
        </div>
      </div>

      <div style={{ flex:1, overflowY:"auto", minHeight:0, padding:"0 20px 24px" }}>
        {stages.map((s,i)=>(
          <div key={s.k} style={{ display:"flex", gap:12, marginBottom:12 }}>
            <div style={{ width:32, position:"relative", flexShrink:0 }}>
              {i<stages.length-1&&<div style={{ position:"absolute", left:14, top:0, bottom:0, borderLeft:"1px dashed var(--paper-edge)" }}/>}
              <div style={{ width:28, height:28, borderRadius:14, marginTop:12,
                background:s.done||s.current?s.color:"var(--paper-2)",
                color:"white", display:"flex", alignItems:"center", justifyContent:"center", fontSize:14,
                boxShadow:s.current?"0 0 0 4px var(--paper)":"none",
                border:s.soon?"1.5px dashed var(--paper-edge)":"none" }}>
                {s.done?"✓":s.current?"✦":""}
              </div>
            </div>
            <div style={{ flex:1, padding:"12px 14px",
              background:s.current?"var(--rose-bg)":"var(--paper-2)",
              border:s.current?"1.5px solid var(--rose-soft)":"1px solid var(--ink-line-2)",
              borderRadius:"var(--r)", opacity:s.soon?.65:1 }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                <div style={{ display:"flex", alignItems:"baseline", gap:8 }}>
                  <span style={{ fontSize:20 }}>{s.emoji}</span>
                  <span style={{ fontFamily:"var(--fs)", fontSize:18, fontWeight:700, color:"var(--ink)" }}>{s.k}</span>
                  <span style={{ fontSize:13, color:"var(--ink-3)" }}>{s.sub}</span>
                </div>
                {s.current&&<span style={{ fontFamily:"var(--fh)", fontSize:14, color:"var(--rose)", fontWeight:700 }}>지금 여기 ✦</span>}
              </div>
              <div style={{ fontSize:13, color:"var(--ink-3)", marginTop:2 }}>{s.range}</div>
              {!s.soon ? (
                <div onClick={()=>nav("gallery")} className="btn" style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginTop:10 }}>
                  <div style={{ display:"flex", gap:4 }}>
                    {["rose","honey","sage","plum"].map((h,j)=><PhotoPH key={j} w={30} h={30} hue={h} rounded={4}/>)}
                  </div>
                  <div style={{ fontSize:13, color:"var(--rose)", fontFamily:"var(--fh)" }}>{s.count}개의 기록 →</div>
                </div>
              ):(
                <div style={{ marginTop:8, fontFamily:"var(--fh)", fontSize:15, color:"var(--ink-3)" }}>곧 만나게 될 시간들…</div>
              )}
            </div>
          </div>
        ))}
      </div>

      <TabBar active="growth" nav={nav}/>    </Phone>
  );
}

                textAlign:"center", background:"var(--paper-2)", borderRadius:"var(--r)",

              <div onClick={()=>{
                if(!inviteName.trim()) return;
                const colors=["#D9A85C","#8E6680","#5C7A8E","#8FA68A","#C4836A"];
                const bgs=["var(--honey-bg)","var(--plum-bg)","#D6E6F2","var(--sage-bg)","var(--rose-bg)"];
                const idx=members.length%colors.length;
                setMembers(ms=>[...ms,{ id:Date.now(), name:inviteName, role:inviteRole,
                  emoji:inviteEmoji, color:colors[idx], bg:bgs[idx],
                  last:"방금", count:0, recent:null, active:false }]);
                setInviteName(""); setInviteEmoji("👤"); setShowInvite(false);
                showToast(`${inviteName}을(를) 추가했어요 🌿`);
              }} className="btn" style={{ flex:1.5, padding:"13px 0", textAlign:"center",
                background:"var(--rose)", borderRadius:"var(--r)", fontSize:16, fontWeight:700, color:"white" }}>추가 완료</div>
            </div>
          </div>
        </div>
      )}

      {delId && <ConfirmModal message="이 구성원을 삭제할까요?"
        onConfirm={()=>{ setMembers(m=>m.filter(x=>x.id!==delId)); setDelId(null); showToast("삭제됐습니다"); }}
        onCancel={()=>setDelId(null)}/>}
      {toast && <Toast message={toast}/>}

      <TabBar active="home" nav={nav}/>    </Phone>
  );
}

    "2026-5-15": [{ type:"diary",    label:"첫 그림 그리기",  color:"var(--honey)" }],
    "2026-5-18": [{ type:"hospital", label:"감기 진료",       color:"var(--sage)" }],
    "2026-5-20": [{ type:"diary",    label:"공원 산책",       color:"var(--rose)" }],
    "2026-5-23": [{ type:"diary",    label:"할머니 댁 방문",  color:"var(--plum)" }],
    "2026-5-25": [{ type:"appt",     label:"예방접종 DTaP",   color:"#5C7A8E" }],
    "2026-5-28": [{ type:"diary",    label:"목욕 대소동",     color:"var(--rose)" }],
    "2026-6-8":  [{ type:"appt",     label:"예방접종 DTaP",   color:"#5C7A8E" }],
  });

  const key = d => `${year}-${month}-${d}`;

  /* ── 저장된 일기 → 달력 이벤트로 변환 ── */
  const ROLE_COLOR = { mom:"var(--rose)", dad:"var(--sage)", both:"var(--honey)" };
  const diaryEvMap = (diaries||[]).reduce((acc, d, idx) => {
    if (!d.date) return acc;
    const yr = d.year || new Date().getFullYear();
    const parts = d.date.split("/");
    if (parts.length !== 2) return acc;
    const k = `${yr}-${parseInt(parts[0])}-${parseInt(parts[1])}`;
    if (!acc[k]) acc[k] = [];
    acc[k].push({
      type: "diary",
      label: `📓 ${d.title || "오늘의 기록"}`,
      color: ROLE_COLOR[d.role] || "var(--rose)",
      fromDiary: true, diaryIdx: idx,
    });
    return acc;
  }, {});

  const HTAG = { rose:"🏥", honey:"💉", sage:"🏥", plum:"📅", blue:"🏥" };
  const HCOL = { rose:"var(--sage)", honey:"var(--honey)", sage:"var(--sage)", plum:"var(--plum)", blue:"#5C7A8E" };
  const HTYP = { rose:"hospital", honey:"appt", sage:"hospital", plum:"appt", blue:"hospital" };
  const hospEvMap = (hospitalRecords||[]).reduce((acc,r)=>{
    const p=r.d.split("/"); if(p.length!==2) return acc;
    const k=`${r.y}-${parseInt(p[0])}-${parseInt(p[1])}`;
    if(!acc[k]) acc[k]=[];
    acc[k].push({type:HTYP[r.tag]||"hospital",label:`${HTAG[r.tag]||"🏥"} ${r.type}`,color:HCOL[r.tag]||"var(--sage)",fromHosp:true});
    return acc;
  },{});

  const evs = d => {
    const k = key(d);
    return [...(evMap[k]||[]), ...(diaryEvMap[k]||[]), ...(hospEvMap[k]||[])];
  };

  /* ── 달력 계산 ── */
  const firstDow    = new Date(year, month-1, 1).getDay(); // 0=일
  const daysInMonth = new Date(year, month, 0).getDate();
  const cells = [
    ...Array(firstDow).fill(null),
    ...Array.from({length:daysInMonth},(_,i)=>i+1),
  ];
  while(cells.length % 7) cells.push(null);

  const prevMonth = () => { if(month===1){setYear(y=>y-1);setMonth(12);}else setMonth(m=>m-1); setSel(1); };
  const nextMonth = () => { if(month===12){setYear(y=>y+1);setMonth(1);}else setMonth(m=>m+1); setSel(1); };

  /* ── 이번 달 통계 ── */
  const pref=`${year}-${month}-`;
  const allEvs=[
    ...Object.entries(evMap).filter(([k])=>k.startsWith(pref)).flatMap(([,v])=>v),
    ...Object.entries(diaryEvMap).filter(([k])=>k.startsWith(pref)).flatMap(([,v])=>v),
    ...Object.entries(hospEvMap).filter(([k])=>k.startsWith(pref)).flatMap(([,v])=>v),
  ];
  const cntDiary = allEvs.filter(e=>e.type==="diary").length;
  const cntHosp  = allEvs.filter(e=>e.type==="hospital").length;
  const cntAppt  = allEvs.filter(e=>e.type==="appt").length;
  const cntStar  = allEvs.filter(e=>e.type==="star").length;

  /* ── 일정 유형 정의 ── */
  const TYPES = [
    { k:"diary",    l:"일기",    dot:"var(--rose)",   bg:"var(--rose-bg)",  ic:"📓" },
    { k:"hospital", l:"병원",    dot:"var(--sage)",   bg:"var(--sage-bg)",  ic:"🏥" },
    { k:"appt",     l:"예약",    dot:"#5C7A8E",       bg:"#D6E6F2",         ic:"📅" },
    { k:"star",     l:"첫 순간", dot:"var(--name)",   bg:"var(--name-bg)",  ic:"✦" },
    { k:"memo",     l:"메모",    dot:"var(--honey)",  bg:"var(--honey-bg)", ic:"📝" },
  ];
  const typeOf = k => TYPES.find(t=>t.k===k)||TYPES[0];

  const doAdd = () => {
    if(!addText.trim()) return;
    const t = typeOf(addType);
    setEvMap(m=>({ ...m, [key(sel)]: [...(m[key(sel)]||[]), { type:addType, label:addText, color:t.dot }] }));
    setAddText(""); setShowAdd(false);
    showToast(`${sel}일에 ${t.l} 기록이 추가됐어요 ✓`);
  };

  const doDelete = (d, idx) => {
    setEvMap(m=>({ ...m, [key(d)]: m[key(d)].filter((_,i)=>i!==idx) }));
  };

  const DOW  = ["일","월","화","수","목","금","토"];
  const _ct = new Date();
  const todayY=_ct.getFullYear(), todayM=_ct.getMonth()+1, todayD=_ct.getDate();

  return (
    <Phone>
      {/* ── 헤더 ── */}
      <div style={{ padding:"54px 20px 10px", flexShrink:0 }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:12 }}>
          <div>
            <div style={{ fontFamily:"var(--fh)", fontSize:15, color:"var(--rose)" }}>calendar</div>
            <div style={{ fontFamily:"var(--fs)", fontSize:24, fontWeight:700, color:"var(--ink)", lineHeight:1.2 }}>{babyName}의 달력</div>
          </div>
          <div onClick={()=>{ setSel(todayD); setYear(todayY); setMonth(todayM); }} className="btn"
            style={{ padding:"5px 12px", borderRadius:999, background:"var(--rose-bg)",
              border:"1px solid var(--rose-soft)", fontSize:14, fontWeight:600, color:"var(--rose)" }}>오늘</div>
        </div>

        {/* 월 이동 */}
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between",
          padding:"10px 4px 10px", borderBottom:"1px solid var(--ink-line-2)" }}>
          <div onClick={prevMonth} className="btn" style={{ width:36, height:36, borderRadius:18,
            background:"var(--paper-2)", border:"1px solid var(--paper-edge)",
            display:"flex", alignItems:"center", justifyContent:"center",
            fontSize:20, color:"var(--ink-2)", fontWeight:300 }}>‹</div>
          <div style={{ fontFamily:"var(--fs)", fontSize:19, fontWeight:700, color:"var(--ink)" }}>
            {year}년 {month}월
          </div>
          <div onClick={nextMonth} className="btn" style={{ width:36, height:36, borderRadius:18,
            background:"var(--paper-2)", border:"1px solid var(--paper-edge)",
            display:"flex", alignItems:"center", justifyContent:"center",
            fontSize:20, color:"var(--ink-2)", fontWeight:300 }}>›</div>
        </div>
      </div>

      <div style={{ flex:1, overflowY:"auto", minHeight:0 }}>
        {/* ── 이달 통계 스트립 ── */}
        <div style={{ display:"flex", gap:0, margin:"10px 20px 10px",
          background:"var(--paper-2)", borderRadius:"var(--r)", border:"1px solid var(--ink-line-2)", overflow:"hidden" }}>
          {[{k:"diary",ic:"📓",l:"일기",v:cntDiary,c:"var(--rose)",bg:"var(--rose-bg)"},
            {k:"hospital",ic:"🏥",l:"병원",v:cntHosp,c:"var(--sage)",bg:"var(--sage-bg)"},
            {k:"appt",ic:"📅",l:"예약",v:cntAppt,c:"#5C7A8E",bg:"#D6E8F5"},
            {k:"star",ic:"✦",l:"첫순간",v:cntStar,c:"var(--name)",bg:"var(--name-bg)"}].map((s,i)=>{
            const on=activeFilter===s.k;
            return (
              <div key={i} onClick={()=>toggleFilter(s.k)} className="btn"
                style={{ flex:1, padding:"10px 4px", textAlign:"center", position:"relative",
                  background:on?s.bg:"transparent", borderRight:i<3?"1px solid var(--ink-line-2)":"none" }}>
                {on&&<div style={{ position:"absolute", top:0, left:0, right:0, height:3, background:s.c, borderRadius:"0 0 2px 2px" }}/>}
                <div style={{ fontSize:on?18:16 }}>{s.ic}</div>
                <div style={{ fontFamily:"var(--fs)", fontSize:17, fontWeight:700, color:on?s.c:"var(--ink)", marginTop:1 }}>{s.v}</div>
                <div style={{ fontSize:11, color:on?s.c:"var(--ink-3)", fontWeight:on?700:400, marginTop:1 }}>{s.l}</div>
              </div>
            );
          })}
        </div>
        {activeFilter&&(()=>{
          const FM={diary:{l:"일기",ic:"📓",c:"var(--rose)",bg:"var(--rose-bg)"},hospital:{l:"병원",ic:"🏥",c:"var(--sage)",bg:"var(--sage-bg)"},appt:{l:"예약",ic:"📅",c:"#5C7A8E",bg:"#D6E8F5"},star:{l:"첫순간",ic:"✦",c:"var(--name)",bg:"var(--name-bg)"}};
          const f=FM[activeFilter];
          const cm={};
          [...Object.entries(evMap).filter(([k])=>k.startsWith(pref)),
           ...Object.entries(diaryEvMap).filter(([k])=>k.startsWith(pref)),
           ...Object.entries(hospEvMap).filter(([k])=>k.startsWith(pref))
          ].forEach(([k,v])=>{cm[k]=[...(cm[k]||[]),...v];});
          const items=[];
          Object.entries(cm).sort(([a],[b])=>parseInt(a.split("-")[2])-parseInt(b.split("-")[2])).forEach(([k,ev])=>{
            const d=parseInt(k.split("-")[2]);
            ev.filter(e=>e.type===activeFilter).forEach(e=>items.push({d,e}));
          });
          return (
            <div style={{ margin:"0 16px 12px", background:"var(--paper-3)", borderRadius:14, border:`1.5px solid ${f.c}`, overflow:"hidden", animation:"fadeIn .18s" }}>
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"10px 14px", background:f.bg }}>
                <span style={{ fontFamily:"var(--fs)", fontSize:15, fontWeight:700, color:f.c }}>{f.ic} {month}월 {f.l} ({items.length}건)</span>
                <div onClick={()=>setActiveFilter(null)} className="btn" style={{ fontSize:17, color:f.c, fontWeight:700 }}>✕</div>
              </div>
              {items.length===0
                ? <div style={{ padding:"18px", textAlign:"center", fontSize:14, color:"var(--ink-3)" }}>이달 {f.l} 기록이 없어요</div>
                : items.map(({d,e},i)=>{ const dw=DOW[(firstDow+d-1)%7]; return (
                  <div key={i} onClick={()=>{setSel(d);setActiveFilter(null);}} className="btn"
                    style={{ display:"flex", alignItems:"center", gap:10, padding:"10px 14px",
                      borderBottom:i<items.length-1?"1px solid var(--ink-line-2)":"none" }}>
                    <div style={{ width:34, textAlign:"center", flexShrink:0 }}>
                      <div style={{ fontFamily:"var(--fs)", fontSize:15, fontWeight:700, color:dw==="일"?"var(--danger)":dw==="토"?"#5C7A8E":"var(--ink)" }}>{d}</div>
                      <div style={{ fontSize:10, color:"var(--ink-3)" }}>{dw}</div>
                    </div>
                    <div style={{ width:3, height:30, borderRadius:2, background:e.color, flexShrink:0 }}/>
                    <div style={{ flex:1, fontSize:14, fontWeight:600, color:"var(--ink)" }}>{e.label}</div>
                    <div style={{ fontSize:14, color:"var(--ink-3)" }}>›</div>
                  </div>
                );})
              }
            </div>
          );
        })()}

        {/* ── 달력 그리드 ── */}
        <div style={{ padding:"0 16px 8px" }}>
          {/* 요일 헤더 */}
          <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", marginBottom:4 }}>
            {DOW.map((d,i)=>(
              <div key={d} style={{ textAlign:"center", fontSize:13, fontWeight:600, padding:"3px 0",
                color:i===0?"var(--danger)":i===6?"#5C7A8E":"var(--ink-3)" }}>{d}</div>
            ))}
          </div>

          {/* 날짜 셀 */}
          <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:"3px 2px" }}>
            {cells.map((d,i)=>{
              if(!d) return <div key={i}/>;
              const dayEvs   = evs(d);
              const isSel    = d===sel;
              const isToday  = d===todayD && year===todayY && month===todayM;
              const dow      = (firstDow + d - 1) % 7;
              const isSun    = dow===0, isSat=dow===6;
              return (
                <div key={i} onClick={()=>setSel(d)} className="btn" style={{ position:"relative",
                  padding:"4px 2px 5px", borderRadius:"var(--rs)", textAlign:"center",
                  background:isSel?"var(--rose)":isToday?"var(--rose-bg)":"transparent",
                  border:isToday&&!isSel?"1.5px solid var(--rose-soft)":"1.5px solid transparent" }}>
                  <div style={{ fontSize:15, fontWeight:isSel||isToday?700:400, lineHeight:1.2,
                    color:isSel?"white":isSun?"var(--danger)":isSat?"#5C7A8E":"var(--ink)" }}>{d}</div>
                  {/* 이벤트 점 */}
                  <div style={{ display:"flex", justifyContent:"center", gap:2, marginTop:2, minHeight:6 }}>
                    {dayEvs.slice(0,3).map((e,j)=>(
                      <div key={j} style={{ width:5, height:5, borderRadius:999,
                        background:isSel?"rgba(255,255,255,.8)":e.color,
                        flexShrink:0 }}/>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* ── 선택된 날 패널 ── */}
        <div style={{ margin:"4px 16px 16px", background:"var(--paper-3)",
          borderRadius:16, border:"1px solid var(--paper-edge)", overflow:"hidden" }}>
          {/* 패널 헤더 */}
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between",
            padding:"12px 16px 10px", borderBottom:"1px dashed var(--paper-edge)" }}>
            <div>
              <div style={{ fontFamily:"var(--fs)", fontSize:17, fontWeight:700, color:"var(--ink)" }}>
                {month}월 {sel}일 ({DOW[(firstDow+sel-1)%7]})
              </div>
              {sel===todayD&&year===todayY&&month===todayM&&(
                <div style={{ fontSize:12, color:"var(--rose)", fontWeight:600, marginTop:1 }}>오늘</div>
              )}
            </div>
            <div onClick={()=>setShowAdd(true)} className="btn"
              style={{ width:32, height:32, borderRadius:16, background:"var(--rose)",
                color:"white", display:"flex", alignItems:"center", justifyContent:"center" }}>
              {cloneElement(I.plus,{width:18,height:18})}
            </div>
          </div>

          {/* 이벤트 목록 */}
          {evs(sel).length===0 ? (
            <div style={{ padding:"22px 16px", textAlign:"center" }}>
              <div style={{ fontSize:26, marginBottom:6 }}>📭</div>
              <div style={{ fontSize:15, color:"var(--ink-3)", fontFamily:"var(--fh)" }}>이날의 기록이 없어요</div>
              <div onClick={()=>setShowAdd(true)} className="btn"
                style={{ display:"inline-block", marginTop:10, padding:"7px 18px",
                  background:"var(--rose-bg)", borderRadius:999, fontSize:14,
                  color:"var(--rose)", fontWeight:600 }}>+ 기록 추가하기</div>
            </div>
          ) : (
            <div style={{ padding:"8px 0" }}>
              {evs(sel).map((e,i)=>{
                const t = typeOf(e.type);
                return (
                  <div key={i} style={{ display:"flex", alignItems:"center", gap:10,
                    padding:"10px 16px", borderBottom:i<evs(sel).length-1?"1px solid var(--ink-line-2)":"none" }}>
                    {/* 색상 사이드바 */}
                    <div style={{ width:4, height:36, borderRadius:2, background:e.color, flexShrink:0 }}/>
                    {/* 아이콘 + 내용 */}
                    <div style={{ width:30, height:30, borderRadius:8, background:t.bg,
                      display:"flex", alignItems:"center", justifyContent:"center",
                      fontSize:17, flexShrink:0 }}>{t.ic}</div>
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:13, color:e.color, fontWeight:600, marginBottom:1 }}>{t.l}</div>
                      <div style={{ fontFamily:"var(--fn)", fontSize:15, fontWeight:600, color:"var(--ink)" }}>{e.label}</div>
                    </div>
                    {/* 액션 */}
                    <div style={{ display:"flex", gap:8 }}>
                      {e.type==="diary"&&(
                        <div onClick={()=>{ if(e.fromDiary) nav("detail"); }} className="btn"
                          style={{ fontSize:13, color:"var(--rose)", fontWeight:600 }}>보기</div>
                      )}
                      <div onClick={()=>doDelete(sel,i)} className="btn" style={{ color:"var(--danger)", opacity:.7 }}>
                        {cloneElement(I.trash,{width:14,height:14})}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>

        {/* ── 이달 전체 일정 미리보기 ── */}
        <div style={{ margin:"0 16px 24px" }}>
          <div style={{ fontFamily:"var(--fs)", fontSize:15, fontWeight:700, color:"var(--ink)", marginBottom:8 }}>
            {month}월 전체 일정
          </div>
          {(()=>{
            const combined = {};
            [...Object.entries(evMap), ...Object.entries(diaryEvMap), ...Object.entries(hospEvMap)]
              .filter(([k])=>k.startsWith(`${year}-${month}-`))
              .forEach(([k,v])=>{ combined[k]=[...(combined[k]||[]),...v]; });
            return Object.entries(combined)
              .sort(([a],[b])=>parseInt(a.split("-")[2])-parseInt(b.split("-")[2]))
              .map(([k,evList])=>{
                const d = parseInt(k.split("-")[2]);
                const dow = DOW[(firstDow+d-1)%7];
                return (
                  <div key={k} onClick={()=>setSel(d)} className="btn"
                    style={{ display:"flex", gap:10, alignItems:"flex-start",
                      padding:"8px 10px", marginBottom:4, background:"var(--paper-2)",
                      borderRadius:"var(--rs)", border:d===sel?"1.5px solid var(--rose-soft)":"1px solid var(--ink-line-2)" }}>
                    <div style={{ textAlign:"center", flexShrink:0, width:32 }}>
                      <div style={{ fontFamily:"var(--fs)", fontSize:17, fontWeight:700,
                        color:dow==="일"?"var(--danger)":dow==="토"?"#5C7A8E":"var(--ink)" }}>{d}</div>
                      <div style={{ fontSize:13, color:"var(--ink-3)" }}>{dow}</div>
                    </div>
                    <div style={{ flex:1 }}>
                      {evList.map((e,i)=>(
                        <div key={i} style={{ display:"flex", alignItems:"center", gap:6,
                          marginBottom:i<evList.length-1?3:0 }}>
                          <div style={{ width:6, height:6, borderRadius:3, background:e.color, flexShrink:0 }}/>
                          <span style={{ fontSize:14, color:"var(--ink-2)" }}>{e.label}</span>
                          {e.fromDiary && <span style={{ fontSize:10, color:"var(--rose)", fontWeight:700 }}>📓</span>}
                        </div>
                      ))}
                    </div>
                  </div>
                );
              });
          })()}
        </div>
      </div>

      {/* ── 일정 추가 시트 ── */}
      {showAdd&&(
        <div style={{ position:"absolute", inset:0, background:"rgba(0,0,0,.45)", zIndex:200,
          display:"flex", alignItems:"flex-end", animation:"fadeIn .18s" }} onClick={()=>setShowAdd(false)}>
          <div style={{ width:"100%", background:"var(--paper-3)", borderRadius:"20px 20px 0 0",
            padding:"0 20px 36px", animation:"slideUp .22s" }} onClick={e=>e.stopPropagation()}>
            <div style={{ display:"flex", justifyContent:"center", padding:"12px 0 4px" }}>
              <div style={{ width:40, height:4, borderRadius:2, background:"var(--paper-edge)" }}/>
            </div>
            <div style={{ fontFamily:"var(--fs)", fontSize:17, fontWeight:700, color:"var(--ink)", padding:"8px 0 14px" }}>
              {month}월 {sel}일 기록 추가
            </div>

            {/* 유형 선택 */}
            <div style={{ fontSize:14, color:"var(--ink-3)", marginBottom:8 }}>유형</div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(5,1fr)", gap:6, marginBottom:16 }}>
              {TYPES.map(t=>(
                <div key={t.k} onClick={()=>setAddType(t.k)} className="btn"
                  style={{ padding:"9px 4px", textAlign:"center", borderRadius:"var(--rs)",
                    background:addType===t.k?t.bg:"var(--paper-2)",
                    border:addType===t.k?`1.5px solid ${t.dot}`:"1px solid var(--paper-edge)" }}>
                  <div style={{ fontSize:20, marginBottom:3 }}>{t.ic}</div>
                  <div style={{ fontSize:12, fontWeight:600, color:addType===t.k?t.dot:"var(--ink-3)" }}>{t.l}</div>
                </div>
              ))}
            </div>

            {/* 내용 입력 */}
            <div style={{ fontSize:14, color:"var(--ink-3)", marginBottom:6 }}>내용</div>
            <input value={addText} onChange={e=>setAddText(e.target.value)}
              placeholder={TYPES.find(t=>t.k===addType)?.l + " 내용을 입력하세요…"}
              style={{ width:"100%", padding:"12px 14px", borderRadius:"var(--rs)",
                border:"1.5px solid var(--paper-edge)", background:"var(--paper-2)",
                fontSize:16, fontFamily:"var(--fn)", outline:"none", marginBottom:16, color:"var(--ink)" }}/>

            <div style={{ display:"flex", gap:8 }}>
              <div onClick={()=>setShowAdd(false)} className="btn"
                style={{ flex:1, padding:"13px 0", textAlign:"center", background:"var(--paper-2)",
                  borderRadius:"var(--r)", border:"1px solid var(--paper-edge)",
                  fontSize:16, fontWeight:600, color:"var(--ink-2)" }}>취소</div>
              <div onClick={doAdd} className="btn"
                style={{ flex:1.5, padding:"13px 0", textAlign:"center",
                  background:"var(--rose)", borderRadius:"var(--r)",
                  fontSize:16, fontWeight:700, color:"white" }}>저장하기</div>
            </div>
          </div>
        </div>
      )}

      {toast&&<Toast message={toast}/>}
      <TabBar active="cal" nav={nav}/>
    </Phone>
  );
}


function App() {
  const [screen,    setScreen]    = useState("home");
  const [appKey,    setAppKey]    = useState(0);
  const [isReset,   setIsReset]   = useState(false);
  const [resetStep, setResetStep] = useState(0);
  const [dbLoaded,  setDbLoaded]  = useState(false); // DB 로드 완료 플래그

  /* ── 영구 저장 상태 ── */
  const [diaries,          setDiaries]          = useState([]);
  const [hospitalRecords,  setHospitalRecords]  = useState(INIT_HOSPITAL_RECORDS);
  const [galleryPhotos,    setGalleryPhotos]    = useState([]);
  const [galleryFolders,   setGalleryFolders]   = useState(GALLERY_INIT_FOLDERS);
  const [editDiary,        setEditDiary]        = useState(null); // 수정 중인 일기
  const [babyName,         setBabyName]         = useState("포동이");
  const [babyEmoji,        setBabyEmoji]        = useState("👶");
  const [babyYear,         setBabyYear]         = useState(2025);
  const [babyMonth,        setBabyMonth]        = useState(3);
  const [babyDay,          setBabyDay]          = useState(10);
  const [babyGender,       setBabyGender]       = useState("비공개");

  /* ── 앱 시작 시 DB에서 로드 ── */
  useEffect(() => {
    Promise.all([
      PDB.get('meta',     'babyInfo'),
      PDB.get('diaries',  'list'),
      PDB.get('hospital', 'list'),
      PDB.get('gallery',  'photos'),
      PDB.get('gallery',  'folders'),
    ]).then(([baby, diaryList, hospList, galleryList, folderList]) => {
      if (baby) {
        setBabyName(baby.name || "포동이");
        setBabyEmoji(baby.emoji || "👶");
        setBabyYear(baby.year || 2025);
        setBabyMonth(baby.month || 3);
        setBabyDay(baby.day || 10);
        setBabyGender(baby.gender || "비공개");
      }
      if (diaryList)  setDiaries(diaryList);
      if (hospList)   setHospitalRecords(hospList);
      if (galleryList) {
        /* 동영상 Blob을 URL로 재생성 — IndexedDB에 저장된 Blob 객체는 그대로 보존됨 */
        const rebuilt = galleryList.map(p => {
          if (p.type === "video" && p.blob) {
            try { return { ...p, url: URL.createObjectURL(p.blob) }; }
            catch { return p; }
          }
          return p;
        });
        setGalleryPhotos(rebuilt);
      }
      if (folderList)  setGalleryFolders(folderList);
    }).catch(() => {}).finally(() => setDbLoaded(true));
  }, []);

  /* ── 상태 변경 시 DB에 저장 ── */
  useEffect(() => { if (!dbLoaded) return; PDB.set('diaries', 'list', diaries); }, [diaries, dbLoaded]);
  useEffect(() => { if (!dbLoaded) return; PDB.set('hospital', 'list', hospitalRecords); }, [hospitalRecords, dbLoaded]);
  useEffect(() => { if (!dbLoaded) return; PDB.set('gallery', 'photos',   galleryPhotos); },   [galleryPhotos, dbLoaded]);
  useEffect(() => { if (!dbLoaded) return; PDB.set('gallery', 'folders',  galleryFolders); }, [galleryFolders, dbLoaded]);
  useEffect(() => {
    if (!dbLoaded) return;
    PDB.set('meta', 'babyInfo', { name:babyName, emoji:babyEmoji, year:babyYear, month:babyMonth, day:babyDay, gender:babyGender });
  }, [babyName, babyEmoji, babyYear, babyMonth, babyDay, babyGender, dbLoaded]);

  /* ── 병원 기록 핸들러 ── */
  const onAddHospRecord = useCallback(r => setHospitalRecords(p=>[r,...p]), []);
  const onDelHospRecord = useCallback(id => setHospitalRecords(p=>p.filter(x=>x.id!==id)), []);

  /* ── 갤러리 핸들러 ── */
  const onAddGalleryPhotos  = useCallback(items => setGalleryPhotos(p=>[...items,...p]), []);
  const onDelGalleryPhoto   = useCallback(id    => setGalleryPhotos(p=>p.filter(x=>x.id!==id)), []);
  const onAddFolder         = useCallback(f     => setGalleryFolders(p=>[...p, f]), []);
  const onUpdateFolder      = useCallback((oldName, updated) => setGalleryFolders(p=>p.map(f=>f.name===oldName?{...f,...updated}:f)), []);
  const onDeleteFolder      = useCallback(name  => setGalleryFolders(p=>p.filter(f=>f.name!==name)), []);

  const nav = useCallback((s, payload) => {
    if (s === "write" && payload?.editDiary) setEditDiary(payload.editDiary);
    else if (s !== "write") setEditDiary(null);
    setScreen(s);
  }, []);

  /* ── 전체 초기화 ── */
  const doReset = useCallback(() => {
    setResetStep(2);
    setTimeout(async () => {
      await PDB.clear();
      setDiaries([]);
      setHospitalRecords(INIT_HOSPITAL_RECORDS);
      setGalleryPhotos([]);
      setScreen("home");
      setBabyName("포동이"); setBabyEmoji("👶"); setBabyYear(2025); setBabyMonth(3); setBabyDay(10); setBabyGender("비공개");
      setIsReset(true); setResetStep(0); setAppKey(k => k + 1);
    }, 1400);
  }, []);

  const onUpdateBaby = useCallback((n,em,yr,mo,dy,gd)=>{ setBabyName(n); setBabyEmoji(em); setBabyYear(yr); setBabyMonth(mo); setBabyDay(dy); setBabyGender(gd); },[]);
  const babyInfo   = { babyName, babyEmoji, babyYear, babyMonth, babyDay, babyGender, onUpdateBaby };
  const hospProps  = { hospitalRecords, onAddHospRecord, onDelHospRecord };
  const screenProps = { nav, diaries, babyName, isReset, onClearReset:()=>setIsReset(false), ...hospProps };

  /* ── DB 로드 전 로딩 화면 ── */
  if (!dbLoaded) return (
    <div style={{ width:"100vw", height:"100dvh", display:"flex", alignItems:"center", justifyContent:"center",
      background:"linear-gradient(160deg,#C8A882 0%,#9B7D58 45%,#6A5038 100%)" }}>
      <div style={{ textAlign:"center", color:"white" }}>
        <div style={{ fontSize:44, marginBottom:14 }}>👶</div>
        <div style={{ fontFamily:"var(--fs)", fontSize:20, fontWeight:700, marginBottom:6 }}>포동이의 성장일기</div>
        <div style={{ fontFamily:"var(--fh)", fontSize:15, opacity:.75 }}>기록을 불러오는 중…</div>
        <div style={{ width:48, height:4, background:"rgba(255,255,255,.3)", borderRadius:2, margin:"20px auto 0", overflow:"hidden" }}>
          <div style={{ height:"100%", background:"white", borderRadius:2, animation:"progress 1.2s ease-in-out infinite" }}/>
        </div>
      </div>
    </div>
  );

  const renderScreen = () => {
    switch(screen) {
      case "cal":         return <CalendarScreen    key={appKey} {...screenProps} diaries={diaries}/>;
      case "home":        return <HomeScreen        key={appKey} {...screenProps} {...babyInfo} onReset={doReset} pdb={PDB} galleryPhotos={galleryPhotos}/>;
      case "write":       return <WriteScreen       key={editDiary?.id||"new"} {...screenProps} editDiary={editDiary}
                                   galleryFolders={galleryFolders} onAddGalleryPhotos={onAddGalleryPhotos}
                                   onSave={d=>{
                                     if(editDiary?.id) {
                                       setDiaries(p=>p.map(x=>x.id===editDiary.id?{...d,id:editDiary.id}:x));
                                     } else {
                                       setDiaries(p=>[d,...p]);
                                     }
                                     setEditDiary(null);
                                   }}/>;
      case "detail":      return <DetailScreen      key={appKey} {...screenProps} {...babyInfo} onDelete={id=>setDiaries(p=>id?p.filter(d=>d.id!==id):p.slice(1))}/>;
      case "gallery":     return <GalleryScreen     key={appKey} {...screenProps} diaries={diaries}
                                   galleryPhotos={galleryPhotos} onAddGalleryPhotos={onAddGalleryPhotos} onDelGalleryPhoto={onDelGalleryPhoto}
                                   galleryFolders={galleryFolders} onAddFolder={onAddFolder} onUpdateFolder={onUpdateFolder} onDeleteFolder={onDeleteFolder}/>;
      case "hospital":    return <HospitalScreen    key={appKey} {...screenProps}/>;
      case "growth":      return <GrowthScreen      key={appKey} {...screenProps} {...babyInfo}/>;
      case "stages":      return <StagesScreen      key={appKey} {...screenProps} {...babyInfo} diaries={diaries} hospitalRecords={hospitalRecords}/>;
      case "family":      return <FamilyScreen      key={appKey} {...screenProps} {...babyInfo} diaries={diaries} hospitalRecords={hospitalRecords}/>;
      case "anniversary": return <AnniversaryScreen key={appKey} {...screenProps} {...babyInfo} diaries={diaries}/>;
      case "book":        return <BookScreen        key={appKey} {...screenProps} {...babyInfo} diaries={diaries}/>;
      case "preview":     return <PreviewScreen     key={appKey} {...screenProps}/>;
      default:            return <HomeScreen        key={appKey} {...screenProps} {...babyInfo} onReset={doReset} pdb={PDB} galleryPhotos={galleryPhotos}/>;
    }
  };

  return (
    <div style={{
      width:"100vw", height:"100vh", height:"100dvh",
      background:"linear-gradient(160deg,#C8A882 0%,#9B7D58 45%,#6A5038 100%)",
      display:"flex", alignItems:"center", justifyContent:"center",
      fontFamily:"var(--fn)",
    }}>
      <div style={{
        width:"min(100vw, 430px)",
        height:"min(100vh, 100dvh)",
        maxHeight:"100dvh",
        position:"relative",
        display:"flex", flexDirection:"column",
        boxShadow:"0 0 0 1px rgba(0,0,0,.12), 0 32px 80px rgba(0,0,0,.35)",
        overflow:"hidden",
        borderRadius:"var(--r-phone, 0px)",
      }}>

      {renderScreen()}

      {/* ── 초기화 진행 애니메이션 ── */}
      {resetStep===2&&(
        <div style={{ position:"fixed", inset:0, background:"var(--paper)", zIndex:9001,
          display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
          gap:18, animation:"fadeIn .25s" }}>
          <div style={{ width:72, height:72, borderRadius:36, background:"var(--danger-bg)",
            display:"flex", alignItems:"center", justifyContent:"center",
            animation:"spin 1s linear infinite" }}>
            <svg viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="var(--danger)" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
              <path d="M3 12a9 9 0 109-9 9 9 0 00-6.36 2.64L3 8"/><path d="M3 3v5h5"/>
            </svg>
          </div>
          <div style={{ fontFamily:"var(--fs)", fontSize:19, fontWeight:700, color:"var(--ink)" }}>초기화 중…</div>
          <div style={{ fontSize:14, color:"var(--ink-3)" }}>모든 데이터를 삭제하고 있습니다</div>
          <div style={{ width:180, height:5, background:"var(--paper-edge)", borderRadius:3, overflow:"hidden" }}>
            <div style={{ height:"100%", background:"var(--danger)", borderRadius:3,
              animation:"progress 1.2s ease-out forwards" }}/>
          </div>
        </div>
      )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));

  </script>
  <script>
    (new MutationObserver(function(m,ob){
      if(document.getElementById("root").children.length>0){
        setTimeout(function(){
          var l=document.getElementById("loading");
          l&&l.classList.add("out");
          setTimeout(function(){l&&l.remove()},500);
        },150);
        ob.disconnect();
      }
    })).observe(document.getElementById("root"),{childList:true,subtree:true});
  </script>
</body>
</html>
